<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner · Luís</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap');

:root {
  --bg:#0e0f11; --surface:#16181c; --surface2:#1c1f26;
  --border:#2a2d35; --border2:#343843;
  --accent:#e8b84b; --a2:#5b8dee; --a3:#e85b5b; --a4:#5be87a; --a5:#9b5be8;
  --text:#e8e9ec; --muted:#7a7f8e; --muted2:#5a5f6e;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Noise overlay */
.noise{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;}

.wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:2rem;}

/* ─── HEADER ─── */
header{display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
h1{font-family:'Syne',sans-serif;font-size:3.2rem;line-height:1;letter-spacing:-2px;font-weight:800;}
h1 em{color:var(--accent);font-style:italic;}
.sub{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);margin-top:.4rem;text-transform:uppercase;letter-spacing:.12em;}
.legend{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:flex-end;}
.li{display:flex;align-items:center;gap:.4rem;font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.ld{width:7px;height:7px;border-radius:50%;}

/* ─── TODAY BANNER ─── */
#today-banner{
  background:linear-gradient(135deg,#1a1c2a 0%,#16181c 60%,#1a1f1a 100%);
  border:1px solid var(--border2);border-left:3px solid var(--accent);
  border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:1.5rem;
  display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center;}
.today-main .today-date{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent);}
.today-main .today-label{font-family:'JetBrains Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.3rem;}
.today-alloc{text-align:right;}
.alloc-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.75rem;padding:.3rem .8rem;border-radius:6px;font-weight:500;}
.alloc-sprint{background:#5b8dee18;color:#8baaff;border:1px solid #5b8dee44;}
.alloc-pas{background:#e8b84b18;color:#f0c96a;border:1px solid #e8b84b44;}
.alloc-formacao{background:#e85b5b18;color:#f07a7a;border:1px solid #e85b5b44;}
.today-tasks{margin-top:.75rem;display:flex;flex-wrap:wrap;gap:.4rem;}
.today-task-chip{font-size:.7rem;font-family:'JetBrains Mono',monospace;padding:.2rem .6rem;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}

/* ─── OBJECTIVES ─── */
.objs{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
.obj{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;position:relative;overflow:hidden;}
.obj::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.obj.c1::before{background:var(--a2);}.obj.c2::before{background:var(--accent);}.obj.c3::before{background:var(--a4);}
.obj .lbl{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.25rem;}
.obj .ttl{font-weight:600;font-size:.88rem;}
.obj.c1 .ttl{color:#8baaff;}.obj.c2 .ttl{color:var(--accent);}.obj.c3 .ttl{color:var(--a4);}
.obj .dl{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:.2rem;}

/* ─── ISSUE TRACKER ─── */
.itrack-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.5rem;}
.itrack{display:grid;grid-template-columns:repeat(9,1fr);gap:.4rem;margin-bottom:1.5rem;}
.inote{font-family:'JetBrains Mono',monospace;font-size:.58rem;margin-top:.3rem;color:var(--muted);}
.icard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;position:relative;overflow:hidden;}
.icard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.icard.done{opacity:.65;}.icard.done::after{content:'✓';position:absolute;top:.5rem;right:.6rem;font-size:.9rem;color:var(--a4);}
.icard.ic-bug::before{background:var(--a3);}.icard.ic-imp::before{background:var(--accent);}
.icard.ic-tst::before{background:var(--a2);}.icard.ic-pdd::before{background:var(--a5);}
.iid{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.2rem;}
.itype{font-size:.64rem;font-weight:600;margin-bottom:.25rem;}
.ic-bug .itype{color:#f07a7a;}.ic-imp .itype{color:var(--accent);}.ic-tst .itype{color:#8baaff;}.ic-pdd .itype{color:#c09bf5;}
.iest{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);margin-bottom:.2rem;}
.idate{font-family:'JetBrains Mono',monospace;font-size:.6rem;margin-top:.3rem;}
.idate.done{color:var(--a4);}.idate.plan{color:var(--muted);}

/* ─── TABS / NAV ─── */
.tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.tab{font-family:'JetBrains Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;
  padding:.45rem .9rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab:hover{border-color:var(--accent);color:var(--accent);}
.tab.on{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:600;}

/* Mobile nav dropdown */
.tabs-mobile{display:none;position:relative;margin-bottom:1.5rem;}
.tabs-mobile select{width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.75rem;padding:.6rem 1rem;
  border-radius:8px;cursor:pointer;appearance:none;outline:none;}
.tabs-mobile::after{content:'▾';position:absolute;right:1rem;top:50%;transform:translateY(-50%);color:var(--accent);pointer-events:none;}

/* ─── VIEWS ─── */
.view{display:none;}.view.on{display:block;}

/* ─── CALENDAR GRID ─── */
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mh{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);text-align:center;padding:.45rem 0;}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.55rem;min-height:108px;}
.dc.we{opacity:.45;}.dc.today-cell{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)22;}
.dc.gc{border-color:var(--a4);}.dc.emp{background:transparent;border-color:transparent;}
.dn{font-family:'JetBrains Mono',monospace;font-size:.76rem;font-weight:500;color:var(--muted);margin-bottom:.35rem;display:flex;align-items:center;justify-content:space-between;}
.dc.today-cell .dn{color:var(--accent);}
.dc.we .dn::after{content:'WE';font-size:.5rem;background:var(--border);padding:1px 4px;border-radius:3px;color:var(--muted);}
.ch{font-size:.59rem;padding:2px 5px;border-radius:3px;margin-bottom:2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.cw{background:#5b8dee18;color:#8baaff;border-left:2px solid #5b8dee;}
.cp{background:#e8b84b18;color:#f0c96a;border-left:2px solid #e8b84b;}
.cc{background:#5be87a18;color:#7aef99;border-left:2px solid #5be87a;}
.cb{background:#e85b5b18;color:#f07a7a;border-left:2px solid #e85b5b;}
.cr{background:#9b5be818;color:#c09bf5;border-left:2px solid #9b5be8;}
.cn{background:#1a4a2822;color:#7aef99;border-left:2px solid #5be87a;}

/* ─── PROGRESS CARDS ─── */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.5rem;}
.pc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;}
.pl{font-family:'JetBrains Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.8rem;}
.pbo{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-bottom:.4rem;}
.pbi{height:100%;border-radius:4px;}
.pt{font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.ml{margin-top:.7rem;}
.ms{display:flex;align-items:center;gap:.5rem;font-size:.72rem;padding:.28rem 0;border-bottom:1px solid var(--border);color:var(--muted);}
.ms:last-child{border-bottom:none;}
.md{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.mx{font-family:'JetBrains Mono',monospace;font-size:.62rem;min-width:55px;}

/* ─── CARDS (week views) ─── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;}
.card h3{font-family:'JetBrains Mono',monospace;font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:1rem;}
.tb{display:flex;gap:.8rem;margin-bottom:.45rem;align-items:flex-start;}
.tt{font-family:'JetBrains Mono',monospace;font-size:.64rem;color:var(--muted);min-width:84px;padding-top:4px;}
.tc{flex:1;font-size:.77rem;padding:4px 8px;border-radius:5px;line-height:1.4;}
.tw{background:#5b8dee18;color:#8baaff;}
.tpp{background:#e8b84b18;color:#f0c96a;}
.tcc{background:#5be87a18;color:#7aef99;}
.tbb{background:#e85b5b18;color:#f07a7a;}
.tn{background:#1a1c22;color:var(--muted);}
.tr{background:#9b5be818;color:#c09bf5;}

/* ─── NOTES ─── */
.note{padding:.75rem;border-radius:8px;margin-top:.75rem;font-size:.73rem;line-height:1.5;}
.note .nl{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem;}
.nr{background:#2a1a4a22;border:1px solid #9b5be833;color:#c09bf5;}
.nw{background:#4a1a1a22;border:1px solid #e85b5b33;color:#f07a7a;}
.ni{background:#2a3f6e22;border:1px solid #5b8dee33;color:#8baaff;}
.ng{background:#1a4a2822;border:1px solid #2a5a3833;color:#7aef99;}

.sh{font-weight:600;font-size:.8rem;margin:1rem 0 .4rem;}
.sh.b{color:#8baaff;}.sh.y{color:var(--accent);}.sh.g{color:var(--a4);}.sh.r{color:#f07a7a;}.sh.v{color:#c09bf5;}

.week-meta{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);margin-bottom:1rem;}

/* ─── ISSUE BADGES (estado visual) ─── */
.issue-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.55rem;
  padding:.15rem .4rem;border-radius:3px;margin-top:.3rem;font-weight:600;letter-spacing:.04em;}
.badge-done    {background:#5be87a18;color:var(--a4);border:1px solid #5be87a44;}
.badge-progress{background:#5b8dee18;color:#8baaff; border:1px solid #5b8dee44;}
.badge-pending {background:#e8b84b18;color:var(--accent);border:1px solid #e8b84b44;}

/* ─── TODAY CELL — borda accent + fundo suave ─── */
.dc.today-cell{
  border-color:var(--accent) !important;
  box-shadow:0 0 0 1px var(--accent)33;
  background:linear-gradient(135deg,#1a1c22 0%,#1e1a0f 100%);
}
.dc.today-cell .dn{color:var(--accent);}

/* ─── MOBILE SIDENAV → menu horizontal sticky no topo ─── */
/* (as tabs já são flex; em mobile tornam-se scroll horizontal sticky) */

/* ─── CERT VIEW ─── */
.dtopics-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.4rem;}
.dtopic{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.6rem .7rem;position:relative;transition:border-color .2s;}
.dtopic:hover{border-color:var(--a4);}
.dtopic-done{opacity:.6;background:#1a4a2811;border-color:#2a5a3855;}
.dtopic-done::after{content:'✓';position:absolute;top:.4rem;right:.5rem;font-size:.75rem;color:var(--a4);}
.dtag{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--accent);font-weight:600;margin-bottom:.2rem;letter-spacing:.06em;}
.dtitle{font-size:.7rem;font-weight:600;color:var(--text);margin-bottom:.2rem;line-height:1.3;}
.ddesc{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);line-height:1.4;}
.dcheck{display:none;}
@media(max-width:1100px){.dtopics-grid{grid-template-columns:repeat(4,1fr);}}
@media(max-width:768px){.dtopics-grid{grid-template-columns:repeat(2,1fr);}}
.cert-hours{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.cert-row{display:flex;justify-content:space-between;font-size:.76rem;}
.cert-row span:first-child{color:var(--muted);}
.cert-row span:last-child{font-family:'JetBrains Mono',monospace;}
.cert-total{border-top:1px solid var(--border);padding-top:.5rem;display:flex;justify-content:space-between;font-size:.85rem;}
.cert-total span:first-child{color:var(--text);font-weight:600;}
.cert-total span:last-child{font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:600;}

/* ─── ALLOC INFO BOX ─── */
.alloc-info{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:1rem 1.2rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;}
.alloc-info-item{display:flex;flex-direction:column;gap:.2rem;}
.alloc-info-item .label{font-family:'JetBrains Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.alloc-info-item .value{font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:500;}
.alloc-info-item .value.sprint{color:#8baaff;}
.alloc-info-item .value.pas{color:var(--accent);}
.alloc-info-item .value.formacao{color:#f07a7a;}
.alloc-info-divider{width:1px;height:40px;background:var(--border);}

/* ─── DAY PICKER ─── */
#day-picker{
  display:flex;gap:.35rem;align-items:center;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;padding:.5rem .75rem;margin-bottom:1.2rem;
  flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;
}
#day-picker::-webkit-scrollbar{display:none;}
.day-picker-label{
  font-family:'JetBrains Mono',monospace;font-size:.6rem;
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);
  white-space:nowrap;padding-right:.5rem;
  border-right:1px solid var(--border);margin-right:.15rem;
}
.dpbtn{
  font-family:'JetBrains Mono',monospace;font-size:.68rem;
  padding:.3rem .7rem;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  transition:all .18s;white-space:nowrap;flex-shrink:0;
  letter-spacing:.04em;
}
.dpbtn:hover{border-color:var(--accent);color:var(--accent);}
.dpbtn.dp-active{
  background:var(--accent);border-color:var(--accent);
  color:var(--bg);font-weight:700;
}
.dpbtn.dp-today::after{
  content:'★';font-size:.55rem;margin-left:.3rem;
  vertical-align:super;color:var(--bg);
}
.dpbtn:not(.dp-active).dp-today::after{color:var(--accent);}

/* Day section in daily view */
#daily-day-content{transition:opacity .15s;}
#daily-day-content.fading{opacity:0;}

/* ─── CERT PHASES ─── */
.cert-phase{margin-bottom:1.4rem;}
.cert-phase-header{
  display:flex;align-items:center;gap:.6rem;
  padding:.5rem .8rem;border-radius:8px;
  margin-bottom:.5rem;
  background:var(--surface2);border:1px solid var(--border2);
}
.cert-phase-tag{
  font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700;
  padding:.15rem .5rem;border-radius:4px;letter-spacing:.08em;
  text-transform:uppercase;
}
.cert-phase-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:var(--text);}
.cert-phase-dates{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);margin-left:auto;}

/* ─── RESPONSIVE ─── */
@media(max-width:1100px){
  .itrack{grid-template-columns:repeat(5,1fr);}
}
@media(max-width:900px){
  .itrack{grid-template-columns:repeat(4,1fr);}
}
@media(max-width:768px){
  body{font-size:.9rem;}
  .wrap{padding:1rem;}
  header{flex-direction:column;align-items:flex-start;gap:1rem;}
  h1{font-size:2.4rem;}
  .legend{justify-content:flex-start;}

  /* Grids → coluna única total */
  .objs{grid-template-columns:1fr;}
  .itrack{grid-template-columns:repeat(2,1fr);}
  .grid2{grid-template-columns:1fr;}
  .pgrid{grid-template-columns:1fr;}
  .dtopics-grid{grid-template-columns:repeat(2,1fr);}

  /* Today banner */
  #today-banner{grid-template-columns:1fr;}
  .today-alloc{text-align:left;margin-top:.5rem;}

  /* Alloc info */
  .alloc-info{gap:.8rem;flex-wrap:wrap;}
  .alloc-info-divider{display:none;}

  /* Cert */
  .cert-hours{gap:.4rem;}

  /* Calendário compacto */
  .mgrid{grid-template-columns:repeat(7,1fr);gap:1px;}
  .dc{min-height:60px;padding:.3rem;}
  .ch{font-size:.5rem;padding:1px 3px;}
  .dn{font-size:.6rem;}
  .mh{font-size:.55rem;}

  /* ── TABS: passam a menu horizontal sticky no topo ── */
  .tabs{
    display:flex !important;          /* sobrepõe o display:none anterior */
    flex-direction:row;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    position:sticky;
    top:0;
    z-index:100;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:.4rem .5rem;
    gap:.35rem;
    margin-bottom:1rem;
    margin-left:-1rem;
    margin-right:-1rem;
    padding-left:1rem;
    padding-right:1rem;
    scrollbar-width:none;             /* Firefox */
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex-shrink:0;
    font-size:.65rem;
    padding:.35rem .7rem;
    white-space:nowrap;
  }

  /* Esconde o dropdown mobile (já não é necessário) */
  .tabs-mobile{display:none;}

  /* Day Picker sticky no mobile */
  #day-picker{
    position:sticky;
    top:48px;           /* abaixo das tabs sticky */
    z-index:99;
    border-radius:0;
    margin-left:-1rem;
    margin-right:-1rem;
    border-left:none;border-right:none;border-top:none;
  }
}
@media(max-width:480px){
  h1{font-size:2rem;}
  .itrack{grid-template-columns:1fr 1fr;}
  .mgrid .mh{font-size:.5rem;}
  .dn{font-size:.62rem;}
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="wrap">

<!-- ════════════════════════════════════════════════════════════
     PLANNER_DB — INÍCIO DO OBJETO DE DADOS
     Para atualizar: pede ao modelo para gerar apenas este bloco.
     Contém: objetivos, issues, semanas, calendário, rotinas, cert.
     ════════════════════════════════════════════════════════════ -->
<script>
const PLANNER_DB = {

  /* ── META ── */
  meta: {
    title: "Planner",
    subtitle: "Planner Pessoal · Rotina Sustentável Anti-Burnout",
    person: "Luís"
  },

  /* ── REGRAS DE ALOCAÇÃO ──
     Compara a data do sistema com as regras definidas.
     Alterar aqui as datas para futuras transições. */
  allocRules: {
    sprintOnly: { until: "2026-04-05" },        /* Até 05 Abr (inclusive): 100% Sprint */
    mixed:      { from:  "2026-04-06" },        /* A partir de 06 Abr: 60% Sprint / 40% PAS */
    formacao:   { days: ["2026-04-13","2026-04-14"] } /* 13 e 14 Abr: 0% Sprint (Formação 8h) */
  },

  /* ── OBJETIVOS / PRIORIDADES ── */
  objectives: [
    { rank:"🥇 Prioridade 1", color:"c2", title:"Certificação Agentic Automation", detail:"🎯 Mock ×3 feito · Exame 24 Mar–6 Abr" },
    { rank:"🥈 Prioridade 2", color:"c3", title:"Sprint: Testes 860 → Testes 644 → PDD 875", detail:"📅 16–27 Mar · 60% slot trabalho" },
    { rank:"🥉 Best Effort",  color:"c1", title:"POC Microsoft Copilot", detail:"⏱ 2h/dia · recuperar POC em falta" }

                {t:"14:00–17:00",cls:"tcc",txt:"📚 Buffer / cert. (3h)"},
                {t:"17:00–18:00",cls:"tpp",txt:"🏋️ Ginásio"},

              ],

            }
          ]

      ]

};

</script>

<!-- ─── MOTOR JAVASCRIPT ─── -->
<script>
/* ══════════════════════════════════════════════════════════
   1. UTILITÁRIOS DE DATA — fonte única: new Date()
   ══════════════════════════════════════════════════════════ */
const hoje     = new Date();
const todayISO = (() => {
  const y = hoje.getFullYear();
  const m = String(hoje.getMonth()+1).padStart(2,'0');
  const d = String(hoje.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
})();
const todayDay   = hoje.getDate();
const todayMonth = hoje.getMonth();   /* 0-indexed */
const todayYear  = hoje.getFullYear();
const todayDow   = hoje.getDay();     /* 0=Dom … 6=Sáb */

const PT_MONTHS  = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                    "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const PT_DAYS    = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira",
                    "Quinta-feira","Sexta-feira","Sábado"];
const PT_DAYS_SH = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const WEEKDAY_LABELS = ["Seg","Ter","Qua","Qui","Sex"]; /* dias úteis */

/* Converte Date → "YYYY-MM-DD" sem fuso horário */
function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
/* Constrói Date local a partir de "YYYY-MM-DD" */
function fromISO(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function isMarch2026()  { return todayMonth === 2 && todayYear === 2026; }
function isApril2026()  { return todayMonth === 3 && todayYear === 2026; }
function isPlannerRange(){ return (isMarch2026() && todayDay >= 23) || isApril2026(); }

/* ══════════════════════════════════════════════════════════
   2. MAPA DE SEMANAS → DATAS REAIS
   Liga cada weekId a um intervalo real [startISO, endISO].
   w4-mar = 23-27 Mar; w1…w4 = semanas de Abril.
   ══════════════════════════════════════════════════════════ */
const WEEK_MAP = {
  /* Março */
  'w1-mar': { start:'2026-03-02', end:'2026-03-08',  label:'Sem 2–6 Mar'   },
  'w2-mar': { start:'2026-03-09', end:'2026-03-15',  label:'Sem 9–13 Mar'  },
  'w3-mar': { start:'2026-03-16', end:'2026-03-22',  label:'Sem 16–20 Mar' },
  'w4-mar': { start:'2026-03-23', end:'2026-03-29',  label:'Sem 23–27 Mar' },
  /* Abril */
  'w1':     { start:'2026-03-30', end:'2026-04-05',  label:'Sem 30 Mar–5 Abr'  },
  'w2':     { start:'2026-04-06', end:'2026-04-12',  label:'Sem 6–10 Abr'  },
  'w3':     { start:'2026-04-13', end:'2026-04-19',  label:'Sem 13–17 Abr' },
  'w4':     { start:'2026-04-20', end:'2026-04-26',  label:'Sem 20–24 Abr' },
};

/* Descobre o weekId da semana actual comparando com WEEK_MAP */
function getCurrentWeekId() {
  for (const [id, rng] of Object.entries(WEEK_MAP)) {
    if (todayISO >= rng.start && todayISO <= rng.end) return id;
  }
  /* fallback: última semana de março para datas fora do mapa */
  if (todayISO < '2026-03-02') return 'w1-mar';
  return 'w4';
}

/* Índice 0-4 (Seg-Sex) do dia actual; -1 se fim de semana */
function getCurrentDayIndex() {
  const dow = todayDow; /* 0=Dom,1=Seg … 5=Sex,6=Sáb */
  if (dow === 0 || dow === 6) return -1;
  return dow - 1; /* 1→0, 2→1 … 5→4 */
}

const currentWeekId  = getCurrentWeekId();
const currentDayIdx  = getCurrentDayIndex();

/* ══════════════════════════════════════════════════════════
   3. MOTOR DE ALOCAÇÃO — dinâmico por data ISO
   ══════════════════════════════════════════════════════════ */
function getAllocation(dateISO) {
  const r = PLANNER_DB.allocRules;
  if (r.formacao.days.includes(dateISO))
    return { type:'formacao', label:'🎓 Formação 8h — 0% Sprint',
             badge:'alloc-formacao', sprint:null, pas:null };
  if (dateISO >= r.mixed.from)
    return { type:'mixed', label:'60% Sprint / 40% PAS',
             badge:'alloc-sprint', sprint:'60% Sprint', pas:'40% PAS' };
  return   { type:'sprint', label:'100% Sprint',
             badge:'alloc-sprint', sprint:'100% Sprint', pas:null };
}
const todayAlloc = getAllocation(todayISO);

/* Retorna ISO do dia útil n (0=Seg) da semana que contém refISO */
function getWeekdayISO(refISO, dayIdx) {
  const ref = fromISO(refISO);
  const dow = ref.getDay(); /* 0=Dom */
  const monday = new Date(ref);
  monday.setDate(ref.getDate() - (dow === 0 ? 6 : dow - 1));
  const target = new Date(monday);
  target.setDate(monday.getDate() + dayIdx);
  return toISO(target);
}

/* ══════════════════════════════════════════════════════════
   4. HELPERS DE RENDERIZAÇÃO
   ══════════════════════════════════════════════════════════ */
function renderNote(n) {
  return `<div class="note ${n.cls}"><div class="nl">${n.label}</div>${n.txt}</div>`;
}
function renderRow(r) {
  return `<div class="tb"><div class="tt">${r.t}</div><div class="tc ${r.cls}">${r.txt}</div></div>`;
}
function renderSection(s) {
  let h = s.shLabel ? `<div class="sh ${s.shCls}">${s.shLabel}</div>` : '';
  (s.rows  || []).forEach(r => h += renderRow(r));
  (s.notes || []).forEach(n => h += renderNote(n));
  return h;
}
function renderCard(c) {
  let inner = `<h3>${c.title}</h3>`;
  (c.sections || []).forEach(s => inner += renderSection(s));
  return `<div class="card">${inner}</div>`;
}

/* ══════════════════════════════════════════════════════════
   5. HEADER & LEGEND
   ══════════════════════════════════════════════════════════ */
document.getElementById('header-sub').textContent = PLANNER_DB.meta.subtitle;
[{color:'#5b8dee',label:'Trabalho/POC'},{color:'#e8b84b',label:'Pessoal'},
 {color:'#5be87a',label:'Certificação'},{color:'#e85b5b',label:'Bloqueado'},
 {color:'#9b5be8',label:'Descanso'}].forEach(l => {
  document.getElementById('legend').innerHTML +=
    `<div class="li"><div class="ld" style="background:${l.color}"></div>${l.label}</div>`;
});

/* ══════════════════════════════════════════════════════════
   6. TODAY BANNER — data real + alocação dinâmica
   ══════════════════════════════════════════════════════════ */
document.getElementById('today-date-text').textContent =
  `${PT_DAYS[todayDow]}, ${todayDay} de ${PT_MONTHS[todayMonth]} ${todayYear}`;

(function renderBannerAlloc() {
  const el = document.getElementById('today-alloc');
  if (todayAlloc.type === 'mixed') {
    el.innerHTML =
      `<div class="alloc-badge alloc-sprint" style="margin-bottom:.3rem">${todayAlloc.sprint}</div><br>` +
      `<div class="alloc-badge alloc-pas">${todayAlloc.pas}</div>`;
  } else {
    el.innerHTML = `<div class="alloc-badge ${todayAlloc.badge}">${todayAlloc.label}</div>`;
  }
})();

/* Chips do dia (calendário de março) */
(function renderBannerChips() {
  const el = document.getElementById('today-tasks');
  if (isMarch2026()) {
    const d = PLANNER_DB.calendar.days.find(x => x.d === todayDay);
    (d && d.chips ? d.chips : []).forEach(chip => {
      const s = document.createElement('span');
      s.className = 'today-task-chip'; s.textContent = chip.t;
      el.appendChild(s);
    });
  } else {
    el.innerHTML = `<span class="today-task-chip">Ver calendário para eventos de hoje</span>`;
  }
})();

/* ══════════════════════════════════════════════════════════
   7. ALLOC INFO BOX
   ══════════════════════════════════════════════════════════ */
(function renderAllocInfo() {
  const vc = todayAlloc.type === 'formacao' ? 'formacao'
           : todayAlloc.type === 'mixed'    ? 'pas' : 'sprint';
  document.getElementById('alloc-info').innerHTML = `
    <div class="alloc-info-item">
      <span class="label">Até 05 Abr</span>
      <span class="value sprint">100% Sprint</span>
    </div>
    <div class="alloc-info-divider"></div>
    <div class="alloc-info-item">
      <span class="label">A partir de 06 Abr</span>
      <span class="value sprint">60% Sprint</span>
      <span class="value pas">40% PAS</span>
    </div>
    <div class="alloc-info-divider"></div>
    <div class="alloc-info-item">
      <span class="label">13–14 Abr</span>
      <span class="value formacao">0% Sprint · Formação 8h</span>
    </div>
    <div class="alloc-info-divider"></div>
    <div class="alloc-info-item">
      <span class="label">Estado hoje</span>
      <span class="value ${vc}">${todayAlloc.label}</span>
    </div>`;
})();

/* ══════════════════════════════════════════════════════════
   8. OBJETIVOS
   ══════════════════════════════════════════════════════════ */
PLANNER_DB.objectives.forEach(o => {
  document.getElementById('objectives-container').innerHTML +=
    `<div class="obj ${o.color}">
       <div class="lbl">${o.rank}</div>
       <div class="ttl">${o.title}</div>
       <div class="dl">${o.detail}</div>
     </div>`;
});

/* ══════════════════════════════════════════════════════════
   9. SPRINT ISSUES — fidelidade visual completa
   ══════════════════════════════════════════════════════════ */
const issueTypeColor = {
  'ic-bug':'var(--a3)', 'ic-imp':'var(--accent)',
  'ic-tst':'var(--a2)', 'ic-pdd':'var(--a5)'
};
(function renderIssues() {
  const done = PLANNER_DB.issues.filter(i => i.done).length;
  document.getElementById('issues-label').textContent =
    `Sprint Issues · ${done}/${PLANNER_DB.issues.length} concluídos · ${PT_DAYS_SH[todayDow]} ${todayDay} ${PT_MONTHS[todayMonth].slice(0,3)}`;

  const el = document.getElementById('issues-container');
  PLANNER_DB.issues.forEach(iss => {
    const col = iss.done ? 'var(--a4)' : (issueTypeColor[iss.type] || 'var(--muted)');
    let badge = '';
    if (iss.done) {
      badge = `<span class="issue-badge badge-done">✅ Concluído</span>`;
    } else if (iss.note) {
      const bc = iss.note.includes('progresso') ? 'badge-progress' : 'badge-pending';
      badge = `<span class="issue-badge ${bc}">${iss.note}</span>`;
    }
    const dateHtml = iss.done
      ? `<div class="idate done">✅ ${iss.date.replace('✅ Concluído ','')}</div>`
      : `<div class="idate plan">📅 ${iss.date.replace('📅 Prev: ','').replace('📅 ','')}</div>`;

    el.innerHTML += `
      <div class="icard ${iss.type}${iss.done?' done':''}"
           style="border-top-color:${col};${iss.done?'opacity:.55;':''}">
        <div class="iid" style="${iss.done?'text-decoration:line-through;':''}">${iss.id}</div>
        <div class="itype" style="color:${col}">${iss.typeLabel}</div>
        <div class="iest" style="${iss.done?'text-decoration:line-through;':''}">${iss.est}</div>
        ${dateHtml}${badge}
      </div>`;
  });
})();

/* ══════════════════════════════════════════════════════════
   10. TABS — desktop + mobile dropdown
       ★ injetado na semana actual da sidenav
   ══════════════════════════════════════════════════════════ */
/* Mapeia weekId (tabs) → chave WEEK_MAP para comparar com currentWeekId */
const tabWeekMap = {
  'w1':'w1-mar', 'w2':'w2-mar', 'w3':'w3-mar', 'w4':'w4-mar'
  /* semanas de abril: os IDs coincidem */
};
function tabMatchesCurrent(tabId) {
  const mapped = tabWeekMap[tabId] || tabId;
  return mapped === currentWeekId;
}

const tabsDesktop      = document.getElementById('tabs-desktop');
const tabsMobileSelect = document.getElementById('tabs-mobile-select');

PLANNER_DB.weeks.forEach((w, i) => {
  const isCurrent = tabMatchesCurrent(w.id);
  const label = isCurrent ? `★ ${w.label}` : w.label;

  const btn = document.createElement('button');
  btn.className = 'tab' + (i === 0 ? ' on' : '');
  btn.textContent = label;
  btn.dataset.weekId = w.id;
  btn.onclick = () => switchView(w.id, btn);
  tabsDesktop.appendChild(btn);

  const opt = document.createElement('option');
  opt.value = w.id; opt.textContent = label;
  tabsMobileSelect.appendChild(opt);
});

function switchView(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('view-' + id).classList.add('on');
  if (btn) btn.classList.add('on');
  tabsMobileSelect.value = id;

  /* Day Picker: só visível na vista Rotina Diária */
  const dp = document.getElementById('day-picker');
  dp.style.display = (id === 'daily') ? 'flex' : 'none';
}

/* ══════════════════════════════════════════════════════════
   11. DAY PICKER
       Injetado no topo de view-daily.
       Ao clicar: atualiza rotina, alocação e eventos do dia.
   ══════════════════════════════════════════════════════════ */
let activeDayIdx = currentDayIdx >= 0 ? currentDayIdx : 0;

(function buildDayPicker() {
  const dp = document.getElementById('day-picker');
  WEEKDAY_LABELS.forEach((lbl, idx) => {
    const dayISO  = getWeekdayISO(todayISO, idx);
    const isToday = (idx === currentDayIdx);
    const certEvt = (PLANNER_DB.calendarEvents || []).find(ev => ev.iso === dayISO);
    const holiday  = (PLANNER_DB.holidays || []).find(h => (h.iso||h.date) === dayISO);

    const btn      = document.createElement('button');
    btn.className  = 'dpbtn' +
                     (idx === activeDayIdx ? ' dp-active' : '') +
                     (isToday             ? ' dp-today'  : '');
    /* Mostrar ícone de cert ou feriado no label */
    let lblSuffix = '';
    if (certEvt)  lblSuffix = ' 📚';
    if (holiday)  lblSuffix = ' 🏖️';
    if (certEvt && certEvt.highlight) lblSuffix = ' 🏆';

    btn.textContent    = lbl + lblSuffix;
    btn.title          = certEvt ? certEvt.label : (holiday ? holiday.name : dayISO);
    btn.dataset.dayIdx = idx;
    btn.dataset.iso    = dayISO;
    btn.onclick = () => selectDay(idx, btn);
    dp.appendChild(btn);
  });
})();

function selectDay(idx, btn) {
  activeDayIdx = idx;
  document.querySelectorAll('.dpbtn').forEach(b => b.classList.remove('dp-active'));
  btn.classList.add('dp-active');

  /* Calcular ISO do dia seleccionado na semana actual */
  const dayISO = getWeekdayISO(todayISO, idx);
  renderDailyForDay(idx, dayISO);
}

/* ══════════════════════════════════════════════════════════
   12. ROTINA DIÁRIA — reactiva ao Day Picker
   ══════════════════════════════════════════════════════════ */
function renderDailyForDay(dayIdx, dayISO) {
  const container = document.getElementById('daily-day-content');
  const routine   = PLANNER_DB.dailyRoutine;
  const alloc     = getAllocation(dayISO);
  const isWeekend = (dayIdx < 0);
  const dayLabel  = isWeekend ? 'Fim de semana' : WEEKDAY_LABELS[dayIdx];
  const isToday   = (dayISO === todayISO);

  /* Alocação badge para este dia */
  let allocBadge = '';
  if (alloc.type === 'mixed') {
    allocBadge = `<span class="alloc-badge alloc-sprint" style="font-size:.65rem">${alloc.sprint}</span>
                  <span class="alloc-badge alloc-pas" style="font-size:.65rem;margin-left:.3rem">${alloc.pas}</span>`;
  } else {
    allocBadge = `<span class="alloc-badge ${alloc.badge}" style="font-size:.65rem">${alloc.label}</span>`;
  }

  /* Eventos do calendário para este dia — usa calendarEvents (qualquer mês) */
  let calEvents = '';
  const certEvt = (PLANNER_DB.calendarEvents || []).find(ev => ev.iso === dayISO);
  const holiday  = (PLANNER_DB.holidays || []).find(h => (h.iso || h.date) === dayISO);

  /* Card de destaque: evento de certificação do dia */
  if (certEvt) {
    const hlStyle = certEvt.highlight
      ? `background:var(--accent)22;border-color:var(--accent);`
      : `background:var(--surface2);border-color:var(--border2);`;
    calEvents += `
      <div style="${hlStyle}border:1px solid;border-radius:8px;padding:.7rem 1rem;margin-bottom:.6rem;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:.58rem;
             text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.3rem;">
          🎓 Certificação · ${dayISO}
        </div>
        <div style="font-size:.82rem;font-weight:600;color:${certEvt.highlight?'var(--accent)':'var(--a4)'}">
          ${certEvt.label}
        </div>
      </div>`;
  }

  /* Feriado */
  if (holiday) {
    calEvents += `
      <div style="background:var(--accent)11;border:1px solid var(--accent)33;
           border-radius:8px;padding:.6rem 1rem;margin-bottom:.6rem;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--accent);">
          🏖️ ${holiday.name} ${holiday.type === 'optional' ? '(opcional)' : ''}
        </div>
      </div>`;
  }

  /* Chips do calendário de março (se aplicável) */
  if (dayISO.startsWith('2026-03-')) {
    const d = parseInt(dayISO.slice(-2));
    const calDay = PLANNER_DB.calendar.days.find(x => x.d === d);
    if (calDay && calDay.chips && calDay.chips.length) {
      const chipsHtml = calDay.chips.map(c =>
        `<div class="ch ${c.c}" style="font-size:.65rem;margin-bottom:3px">${c.t}</div>`
      ).join('');
      calEvents += `
        <div style="background:var(--surface2);border-radius:8px;
             border:1px solid var(--border2);padding:.7rem 1rem;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:.58rem;
               text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.4rem;">
            📅 Agenda · ${d} Mar
          </div>
          ${chipsHtml}
        </div>`;
    }
  }

  /* Rotina do dia (dias úteis) */
  let rows = '';
  if (isWeekend || dayIdx < 0) {
    rows = `<div class="note nr" style="margin-top:0">
              <div class="nl">🌿 Fim de semana</div>
              Descanso, recuperação, passeios. Zero ecrãs exigentes.
            </div>`;
  } else {
    rows = routine.weekdays.map(r => renderRow(r)).join('');
  }

  const notes   = (routine.notes || []).map(n => renderNote(n)).join('');
  const ab      = PLANNER_DB.antiBurnout.map(n => renderNote(n)).join('');
  const math    = `
    <div style="padding:.75rem;background:#1a1c22;border-radius:8px;
         border:1px solid var(--border);font-size:.75rem;color:var(--muted);margin-top:.75rem;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:.6rem;margin-bottom:.25rem;">
        📊 MATEMÁTICA DO BURNOUT
      </div>
      ${PLANNER_DB.burnoutMath}
    </div>`;

  /* Fade transition */
  container.classList.add('fading');
  setTimeout(() => {
    container.innerHTML = `
      <!-- Day header -->
      <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1rem;flex-wrap:wrap;">
        <div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;
             color:${isToday?'var(--accent)':'var(--text)'}">
          ${dayLabel}${isToday ? ' <span style="font-size:.75rem;color:var(--accent)">· hoje</span>' : ''}
        </div>
        <div style="display:flex;gap:.4rem;flex-wrap:wrap">${allocBadge}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:.62rem;
             color:var(--muted2);margin-left:auto;">${dayISO}</div>
      </div>
      ${calEvents ? `<div style="margin-bottom:1rem;">${calEvents}</div>` : ''}
      <div class="grid2">
        <div class="card">
          <h3>Rotina Base — ${dayLabel}</h3>
          ${rows}${notes}
        </div>
        <div class="card">
          <h3>Filosofia Anti-Burnout</h3>
          ${ab}${math}
        </div>
      </div>`;
    container.classList.remove('fading');
  }, 150);
}

/* ══════════════════════════════════════════════════════════
   13. CALENDÁRIO — dinâmico puro, sem star/highlight estáticos
       · today-cell → apenas o dia actual (todayISO)
       · Feriados → bordado laranja leve
       · Eventos cert. → chip adicional se existir em calendarEvents
   ══════════════════════════════════════════════════════════ */
(function renderMonth() {
  const cal      = PLANNER_DB.calendar;
  const view     = document.getElementById('view-month');
  const year     = cal.year;   /* 2026 */
  const monthIdx = 2;          /* Março = índice 2 */

  /* Índices rápidos para lookup O(1) */
  const holidaySet = new Set((PLANNER_DB.holidays || []).map(h => h.iso || h.date));
  const certEvtMap = {};
  (PLANNER_DB.calendarEvents || []).forEach(ev => {
    if (ev.iso && ev.iso.startsWith('2026-03-')) {
      const d = parseInt(ev.iso.slice(-2));
      if (!certEvtMap[d]) certEvtMap[d] = [];
      certEvtMap[d].push(ev);
    }
  });

  let html = '<div class="mgrid">';
  ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].forEach(d =>
    html += `<div class="mh">${d}</div>`);
  for (let i = 0; i < cal.startOffset; i++)
    html += '<div class="dc emp"></div>';

  cal.days.forEach(day => {
    const dayISO  = `${year}-03-${String(day.d).padStart(2,'0')}`;
    const isToday = (dayISO === todayISO);

    /* Classe base: apenas weekend ou today — sem highlight estático */
    let cls = 'dc';
    if (day.we)   cls += ' we';
    if (isToday)  cls += ' today-cell';

    /* ★ apenas no dia actual */
    const todayBadge = isToday
      ? `<span style="color:var(--accent);font-size:.58rem;margin-left:.25rem">★ hoje</span>` : '';

    /* Feriado badge */
    const holiday = (PLANNER_DB.holidays || []).find(h => (h.iso||h.date) === dayISO);
    const holidayBadge = holiday
      ? `<div class="ch" style="background:#e8b84b11;color:var(--accent);border-left:2px solid var(--accent);font-size:.55rem;">
           🏖️ ${holiday.name}
         </div>` : '';

    /* Chips base do dia */
    let chipsHtml = (day.chips || [])
      .map(c => `<div class="ch ${c.c}">${c.t}</div>`).join('');

    /* Chips de eventos cert. (se não estiverem já nos chips base) */
    if (certEvtMap[day.d]) {
      certEvtMap[day.d].forEach(ev => {
        /* Evita duplicar se já aparece nos chips base */
        if (!chipsHtml.includes(ev.label.slice(0,12))) {
          chipsHtml += `<div class="ch ${ev.chipCls||'cc'}">${ev.label}</div>`;
        }
      });
    }

    html += `<div class="${cls}">
      <div class="dn">${day.d}${todayBadge}</div>
      ${holidayBadge}${chipsHtml}
    </div>`;
  });

  const used = cal.startOffset + cal.days.length;
  const pad  = used % 7 === 0 ? 0 : 7 - (used % 7);
  for (let i = 0; i < pad; i++) html += '<div class="dc emp"></div>';
  html += '</div>';

  /* Progress cards */
  html += '<div class="pgrid">';
  PLANNER_DB.progress.forEach(p => {
    const ms = p.milestones.map(m =>
      `<div class="ms"><div class="md" style="background:${p.color}"></div>
       <span class="mx">${m.mx}</span>${m.txt}</div>`).join('');
    html += `<div class="pc">
      <div class="pl">${p.label}</div>
      <div class="pbo"><div class="pbi" style="width:${p.pct}%;background:${p.color}"></div></div>
      <div class="pt">${p.sub}</div>
      <div class="ml">${ms}</div>
    </div>`;
  });
  html += '</div>';
  view.innerHTML = html;
})();

/* ══════════════════════════════════════════════════════════
   14. SEMANAS DETALHADAS — ★ na semana actual
   ══════════════════════════════════════════════════════════ */
/* Mapa tab id → week_map key (semanas de março usam sufixo -mar) */
const weekViewMap = { w1:'w1-mar', w2:'w2-mar', w3:'w3-mar', w4:'w4-mar' };

['w1','w2','w3','w4'].forEach(wid => {
  const data = PLANNER_DB.weekDetails[wid];
  if (!data) return;
  const mappedId    = weekViewMap[wid] || wid;
  const isCurrent   = (mappedId === currentWeekId);
  const metaPrefix  = isCurrent
    ? `<span style="color:var(--accent)">★ Semana actual</span> · ` : '';

  let html = `<div class="week-meta">${metaPrefix}${data.meta}</div><div class="grid2">`;
  data.cards.forEach(c => html += renderCard(c));
  html += '</div>';
  document.getElementById('view-' + wid).innerHTML = html;
});

/* ══════════════════════════════════════════════════════════
   15. CERTIFICAÇÃO — renderCert() com phases
   Preparado para receber PLANNER_DB.cert.phases quando existir.
   ══════════════════════════════════════════════════════════ */
(function renderCert() {
  const view = document.getElementById('view-cert');
  const cert = PLANNER_DB.cert;

  /* ── D1–D14 topics ── */
  const topicsDone = cert.topics.filter(t => t.done).length;
  const topicsPct  = Math.round(topicsDone / cert.topics.length * 100);
  const topicsHtml = cert.topics.map(t => `
    <div class="dtopic${t.done ? ' dtopic-done' : ''}">
      <div class="dtag">${t.d}</div>
      <div class="dtitle">${t.title}</div>
      <div class="ddesc">${t.desc}</div>
    </div>`).join('');

  /* ── Phases: lê cert.phases se existir; senão constrói das weeks ── */
  let phasesHtml = '';
  if (cert.phases && cert.phases.length) {
    /* Estrutura preparada para uso futuro:
       cert.phases = [{ tag, title, dates, color, events:[{date,task,done}] }] */
    cert.phases.forEach(ph => {
      const eventsHtml = (ph.events || []).map(ev => `
        <div class="tb">
          <div class="tt" style="color:${ph.color || 'var(--accent)'}">${ev.date}</div>
          <div class="tc ${ev.done ? 'tcc' : 'tw'}" style="${ev.done?'opacity:.7':''}">${ev.task}</div>
        </div>`).join('');
      phasesHtml += `
        <div class="cert-phase">
          <div class="cert-phase-header">
            <span class="cert-phase-tag" style="background:${ph.color||'var(--accent)'}22;
              color:${ph.color||'var(--accent)'};border:1px solid ${ph.color||'var(--accent)'}44">
              ${ph.tag}
            </span>
            <span class="cert-phase-title">${ph.title}</span>
            <span class="cert-phase-dates">${ph.dates}</span>
          </div>
          ${eventsHtml}
        </div>`;
    });
  } else {
    /* Fallback: renderiza as weeks existentes (comportamento anterior) */
    cert.weeks.forEach(w => {
      const marker = w.note ? ` (${w.note})` : (w.sessions ? ` (${w.sessions} sessões = ${w.hours})` : '');
      phasesHtml += `<div class="sh ${w.cls}">${w.label}${marker}</div>`;
      w.days.forEach(d =>
        phasesHtml += `<div class="tb"><div class="tt">${d.d}</div><div class="tc ${d.cls}">${d.txt}</div></div>`);
    });
  }

  /* ── Horas breakdown ── */
  let hoursHtml = cert.hoursBreakdown.map(h =>
    `<div class="cert-row">
       <span>${h.label}</span>
       <span style="color:${h.color};font-family:'JetBrains Mono',monospace">${h.hrs}</span>
     </div>`).join('');
  hoursHtml += `<div class="cert-total"><span>Total</span><span>${cert.totalHours}</span></div>`;

  /* ── Notas de rodapé: .note .ng / .nr / .nw ── */
  const footerNotes = cert.notes.map(n => renderNote(n)).join('');

  view.innerHTML = `
    <div style="font-family:'JetBrains Mono',monospace;font-size:.65rem;
         color:var(--muted);margin-bottom:1.2rem;">
      🎯 ${cert.title} · Target:
      <span style="color:var(--accent)">${cert.target}</span>
    </div>

    <!-- D1–D14 progress -->
    <div style="margin-bottom:1.5rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:.6rem;
             text-transform:uppercase;letter-spacing:.1em;color:var(--muted);">
          Tópicos D1–D14 · ${topicsDone}/${cert.topics.length} concluídos
        </div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:.72rem;
             color:var(--a4);font-weight:600;">${topicsPct}%</div>
      </div>
      <div class="pbo" style="margin-bottom:1rem;">
        <div class="pbi" style="width:${topicsPct}%;background:var(--a4)"></div>
      </div>
      <div class="dtopics-grid">${topicsHtml}</div>
    </div>

    <!-- Phases / Plano semanal + Horas -->
    <div class="grid2">
      <div class="card">
        <h3>Plano de Estudo · Fases</h3>
        ${phasesHtml}
      </div>
      <div class="card">
        <h3>Horas Totais &amp; Estratégia</h3>
        <div class="cert-hours">${hoursHtml}</div>
        <!-- Notas rodapé: .note .ng (verde) / .nr (roxo) / .nw (laranja) -->
        ${footerNotes}
      </div>
    </div>`;
})();

/* ══════════════════════════════════════════════════════════
   16. ACTIVAÇÃO AUTOMÁTICA — executa por último
   ══════════════════════════════════════════════════════════ */
(function autoActivate() {
  /* Encontra o tab que corresponde à semana actual */
  let targetTabId = 'month';
  PLANNER_DB.weeks.forEach(w => {
    if (tabMatchesCurrent(w.id)) targetTabId = w.id;
  });

  const allTabs = document.querySelectorAll('.tab');
  allTabs.forEach(btn => {
    btn.classList.toggle('on', btn.dataset.weekId === targetTabId);
  });
  tabsMobileSelect.value = targetTabId;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.getElementById('view-' + targetTabId).classList.add('on');

  /* Renderiza rotina do dia actual */
  renderDailyForDay(activeDayIdx, getWeekdayISO(todayISO, activeDayIdx));
})();

</script>
