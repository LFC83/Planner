<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner v21 · Luís</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap');

:root {
  --bg:#0e0f11; --surface:#16181c; --surface2:#1c1f26;
  --border:#2a2d35; --border2:#343843;
  --accent:#e8b84b; --a2:#5b8dee; --a3:#e85b5b; --a4:#5be87a; --a5:#9b5be8;
  --text:#e8e9ec; --muted:#7a7f8e; --muted2:#5a5f6e;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Noise overlay */
.noise{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;}

.wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:2rem;}

/* ─── HEADER ─── */
header{display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
h1{font-family:'Syne',sans-serif;font-size:3.2rem;line-height:1;letter-spacing:-2px;font-weight:800;}
h1 em{color:var(--accent);font-style:italic;}
.sub{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);margin-top:.4rem;text-transform:uppercase;letter-spacing:.12em;}
.legend{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:flex-end;}
.li{display:flex;align-items:center;gap:.4rem;font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.ld{width:7px;height:7px;border-radius:50%;}

/* ─── TODAY BANNER ─── */
#today-banner{
  background:linear-gradient(135deg,#1a1c2a 0%,#16181c 60%,#1a1f1a 100%);
  border:1px solid var(--border2);border-left:3px solid var(--accent);
  border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:1.5rem;
  display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center;}
.today-main .today-date{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent);}
.today-main .today-label{font-family:'JetBrains Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.3rem;}
.today-alloc{text-align:right;}
.alloc-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.75rem;padding:.3rem .8rem;border-radius:6px;font-weight:500;}
.alloc-sprint{background:#5b8dee18;color:#8baaff;border:1px solid #5b8dee44;}
.alloc-pas{background:#e8b84b18;color:#f0c96a;border:1px solid #e8b84b44;}
.alloc-formacao{background:#e85b5b18;color:#f07a7a;border:1px solid #e85b5b44;}
.today-tasks{margin-top:.75rem;display:flex;flex-wrap:wrap;gap:.4rem;}
.today-task-chip{font-size:.7rem;font-family:'JetBrains Mono',monospace;padding:.2rem .6rem;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}

/* ─── OBJECTIVES ─── */
.objs{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
.obj{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;position:relative;overflow:hidden;}
.obj::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.obj.c1::before{background:var(--a2);}.obj.c2::before{background:var(--accent);}.obj.c3::before{background:var(--a4);}
.obj .lbl{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.25rem;}
.obj .ttl{font-weight:600;font-size:.88rem;}
.obj.c1 .ttl{color:#8baaff;}.obj.c2 .ttl{color:var(--accent);}.obj.c3 .ttl{color:var(--a4);}
.obj .dl{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:.2rem;}

/* ─── ISSUE TRACKER ─── */
.itrack-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.5rem;}
.itrack{display:grid;grid-template-columns:repeat(9,1fr);gap:.4rem;margin-bottom:1.5rem;}
.inote{font-family:'JetBrains Mono',monospace;font-size:.58rem;margin-top:.3rem;color:var(--muted);}
.icard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;position:relative;overflow:hidden;}
.icard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.icard.done{opacity:.65;}.icard.done::after{content:'✓';position:absolute;top:.5rem;right:.6rem;font-size:.9rem;color:var(--a4);}
.icard.ic-bug::before{background:var(--a3);}.icard.ic-imp::before{background:var(--accent);}
.icard.ic-tst::before{background:var(--a2);}.icard.ic-pdd::before{background:var(--a5);}
.iid{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.2rem;}
.itype{font-size:.64rem;font-weight:600;margin-bottom:.25rem;}
.ic-bug .itype{color:#f07a7a;}.ic-imp .itype{color:var(--accent);}.ic-tst .itype{color:#8baaff;}.ic-pdd .itype{color:#c09bf5;}
.iest{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);margin-bottom:.2rem;}
.idate{font-family:'JetBrains Mono',monospace;font-size:.6rem;margin-top:.3rem;}
.idate.done{color:var(--a4);}.idate.plan{color:var(--muted);}

/* ─── TABS / NAV ─── */
.tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.tab{font-family:'JetBrains Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;
  padding:.45rem .9rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab:hover{border-color:var(--accent);color:var(--accent);}
.tab.on{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:600;}

/* Mobile nav dropdown */
.tabs-mobile{display:none;position:relative;margin-bottom:1.5rem;}
.tabs-mobile select{width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.75rem;padding:.6rem 1rem;
  border-radius:8px;cursor:pointer;appearance:none;outline:none;}
.tabs-mobile::after{content:'▾';position:absolute;right:1rem;top:50%;transform:translateY(-50%);color:var(--accent);pointer-events:none;}

/* ─── VIEWS ─── */
.view{display:none;}.view.on{display:block;}

/* ─── CALENDAR GRID ─── */
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mh{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);text-align:center;padding:.45rem 0;}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.55rem;min-height:108px;}
/* ─── MONTH TITLE (sticky) ─── */
.month-title{
  position:sticky;top:0;background:var(--surface);z-index:10;
  font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;
  letter-spacing:-.02em;color:var(--text);
  padding:.5rem .75rem;border-bottom:1px solid var(--border);
}
/* ─── CALENDAR GRID min-height para dias com muitos eventos ─── */
.calendar-grid{min-height:300px;}
.dc.we{opacity:.45;}.dc.today-cell{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)22;}
.dc.gc{border-color:var(--a4);}.dc.emp{background:transparent;border-color:transparent;}
.dn{font-family:'JetBrains Mono',monospace;font-size:.76rem;font-weight:500;color:var(--muted);margin-bottom:.35rem;display:flex;align-items:center;justify-content:space-between;}
.dc.today-cell .dn{color:var(--accent);}
.dc.we .dn::after{content:'WE';font-size:.5rem;background:var(--border);padding:1px 4px;border-radius:3px;color:var(--muted);}
.ch{font-size:.59rem;padding:2px 5px;border-radius:3px;margin-bottom:2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.cw{background:#5b8dee18;color:#8baaff;border-left:2px solid #5b8dee;}
.cp{background:#e8b84b18;color:#f0c96a;border-left:2px solid #e8b84b;}
.cc{background:#5be87a18;color:#7aef99;border-left:2px solid #5be87a;}
.cb{background:#e85b5b18;color:#f07a7a;border-left:2px solid #e85b5b;}
.cr{background:#9b5be818;color:#c09bf5;border-left:2px solid #9b5be8;}
.cn{background:#1a4a2822;color:#7aef99;border-left:2px solid #5be87a;}

/* ─── PROGRESS CARDS ─── */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.5rem;}
.pc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;}
.pl{font-family:'JetBrains Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.8rem;}
.pbo{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-bottom:.4rem;}
.pbi{height:100%;border-radius:4px;}
.pt{font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.ml{margin-top:.7rem;}
.ms{display:flex;align-items:center;gap:.5rem;font-size:.72rem;padding:.28rem 0;border-bottom:1px solid var(--border);color:var(--muted);}
.ms:last-child{border-bottom:none;}
.md{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.mx{font-family:'JetBrains Mono',monospace;font-size:.62rem;min-width:55px;}

/* ─── CARDS (week views) ─── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;}
.card h3{font-family:'JetBrains Mono',monospace;font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:1rem;}
.tb{display:flex;gap:.8rem;margin-bottom:.45rem;align-items:flex-start;}
.tt{font-family:'JetBrains Mono',monospace;font-size:.64rem;color:var(--muted);min-width:84px;padding-top:4px;}
.tc{flex:1;font-size:.77rem;padding:4px 8px;border-radius:5px;line-height:1.4;}
.tw{background:#5b8dee18;color:#8baaff;}
.tpp{background:#e8b84b18;color:#f0c96a;}
.tcc{background:#5be87a18;color:#7aef99;}
.tbb{background:#e85b5b18;color:#f07a7a;}
.tn{background:#1a1c22;color:var(--muted);}
.tr{background:#9b5be818;color:#c09bf5;}

/* ─── NOTES ─── */
.note{padding:.75rem;border-radius:8px;margin-top:.75rem;font-size:.73rem;line-height:1.5;}
.note .nl{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem;}
.nr{background:#2a1a4a22;border:1px solid #9b5be833;color:#c09bf5;}
.nw{background:#4a1a1a22;border:1px solid #e85b5b33;color:#f07a7a;}
.ni{background:#2a3f6e22;border:1px solid #5b8dee33;color:#8baaff;}
.ng{background:#1a4a2822;border:1px solid #2a5a3833;color:#7aef99;}

.sh{font-weight:600;font-size:.8rem;margin:1rem 0 .4rem;}
.sh.b{color:#8baaff;}.sh.y{color:var(--accent);}.sh.g{color:var(--a4);}.sh.r{color:#f07a7a;}.sh.v{color:#c09bf5;}

.week-meta{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);margin-bottom:1rem;}

/* ─── ISSUE BADGES (estado visual) ─── */
.issue-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.55rem;
  padding:.15rem .4rem;border-radius:3px;margin-top:.3rem;font-weight:600;letter-spacing:.04em;}
.badge-done    {background:#5be87a18;color:var(--a4);border:1px solid #5be87a44;}
.badge-progress{background:#5b8dee18;color:#8baaff; border:1px solid #5b8dee44;}
.badge-pending {background:#e8b84b18;color:var(--accent);border:1px solid #e8b84b44;}


/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   VERTICAL TIMELINE (estilo Março-v2)
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.timeline-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1rem;}
.tl-header{padding:.6rem 1rem;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);display:flex;align-items:center;justify-content:space-between;}
.tl-header-alloc{font-size:.58rem;padding:.15rem .5rem;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.tl-row{display:flex;align-items:flex-start;gap:.75rem;padding:.55rem 1rem;border-bottom:1px solid var(--border);transition:background .15s;}
.tl-row:last-child{border-bottom:none;}
.tl-row:hover{background:var(--surface2);}
.tl-time{font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--muted);min-width:100px;padding-top:3px;flex-shrink:0;}
.tl-content{flex:1;font-size:.8rem;padding:4px 10px 4px 12px;border-radius:6px;border-left:3px solid transparent;line-height:1.45;}
/* Cores por tipo — mapeadas às variáveis do planner-abril */
.tc-work  {background:#5b8dee14;color:#8baaff;  border-left-color:var(--a2);}
.tc-pas   {background:#e8b84b14;color:#f0c96a;  border-left-color:var(--accent);}
.tc-cert  {background:#9b5be814;color:#c09bf5;  border-left-color:var(--a5);}
.tc-issue {background:#e8b84b10;color:var(--accent);border-left-color:var(--accent);}
.tc-meal  {background:#ffffff06;color:var(--muted);border-left-color:var(--border2);}
.tc-rest  {background:#9b5be810;color:#c09bf5;  border-left-color:var(--a5);}
.tc-holiday{background:#5be87a10;color:#7aef99; border-left-color:var(--a4);}
.tc-formacao{background:#e85b5b12;color:#f07a7a;border-left-color:var(--a3);}
.tc-pdd   {background:#5be87a0c;color:#7aef99;  border-left-color:#5be87a88;}
.tc-study {background:#5b8dee18;color:#8baaff;  border-left-color:var(--a2);}  /* ← Estudo Cert. --a2 */
/* Notes laterais na timeline */
.tl-notes{display:flex;flex-direction:column;gap:.5rem;}
.tl-note{padding:.65rem .85rem;border-radius:8px;font-size:.74rem;line-height:1.5;border:1px solid transparent;}
.tl-note .nl{font-family:'JetBrains Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;opacity:.8;}
.tl-note.tn-green{background:#5be87a0e;border-color:#5be87a25;color:#7aef99;}
.tl-note.tn-blue {background:#5b8dee0e;border-color:#5b8dee25;color:#8baaff;}
.tl-note.tn-red  {background:#e85b5b0e;border-color:#e85b5b25;color:#f07a7a;}
.tl-note.tn-gold {background:#e8b84b0e;border-color:#e8b84b25;color:#f0c96a;}
.tl-note.tn-purple{background:#9b5be80e;border-color:#9b5be825;color:#c09bf5;}
/* Layout 2 colunas quando viewport > 900px */
.tl-day-layout{display:grid;grid-template-columns:1fr;gap:.75rem;}
@media(min-width:900px){.tl-day-layout{grid-template-columns:1fr 280px;}}
/* Day-nav dentro da rotina */
.tl-day-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-.03em;color:var(--text);margin-bottom:.25rem;}
.tl-day-title span{color:var(--muted);font-weight:400;font-size:.85rem;margin-left:.4rem;}
.tl-day-sub{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);margin-bottom:1rem;}

/* ─── CALENDAR SPECIAL CELLS ─── */
/* Feriado: fundo vermelho suave */
.dc.is-holiday{
  background:linear-gradient(135deg,#1e1010 0%,#16181c 100%);
  border-color:var(--a3);
}
.dc.is-holiday .dn{color:#f07a7a;}
.holiday-chip{
  font-size:.54rem;padding:2px 5px;border-radius:3px;margin-bottom:2px;
  background:#e85b5b18;color:#f07a7a;border-left:2px solid var(--a3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;
}
/* Evento de certificação: ponto accent no dia */
.dc.has-cert-event .dn::after{
  content:'●';color:var(--accent);font-size:.5rem;margin-left:auto;
}

/* ─── TODAY CELL — borda accent + fundo suave ─── */
.dc.today-cell{
  border-color:var(--accent) !important;
  box-shadow:0 0 0 1px var(--accent)33;
  background:linear-gradient(135deg,#1a1c22 0%,#1e1a0f 100%);
}
.dc.today-cell .dn{color:var(--accent);}

/* ─── MOBILE SIDENAV → menu horizontal sticky no topo ─── */
/* (as tabs já são flex; em mobile tornam-se scroll horizontal sticky) */

/* ─── CERT VIEW ─── */
.dtopics-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.4rem;}
.dtopic{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.6rem .7rem;position:relative;transition:border-color .2s;}
.dtopic:hover{border-color:var(--a4);}
.dtopic-done{opacity:.6;background:#1a4a2811;border-color:#2a5a3855;}
.dtopic-done::after{content:'✓';position:absolute;top:.4rem;right:.5rem;font-size:.75rem;color:var(--a4);}
.dtag{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--accent);font-weight:600;margin-bottom:.2rem;letter-spacing:.06em;}
.dtitle{font-size:.7rem;font-weight:600;color:var(--text);margin-bottom:.2rem;line-height:1.3;}
.ddesc{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);line-height:1.4;}
.dcheck{display:none;}
@media(max-width:1100px){.dtopics-grid{grid-template-columns:repeat(4,1fr);}}
@media(max-width:768px){.dtopics-grid{grid-template-columns:repeat(2,1fr);}}
.cert-hours{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.cert-row{display:flex;justify-content:space-between;font-size:.76rem;}
.cert-row span:first-child{color:var(--muted);}
.cert-row span:last-child{font-family:'JetBrains Mono',monospace;}
.cert-total{border-top:1px solid var(--border);padding-top:.5rem;display:flex;justify-content:space-between;font-size:.85rem;}
.cert-total span:first-child{color:var(--text);font-weight:600;}
.cert-total span:last-child{font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:600;}

/* ─── ALLOC INFO BOX ─── */
.alloc-info{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:1rem 1.2rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;}
.alloc-info-item{display:flex;flex-direction:column;gap:.2rem;}
.alloc-info-item .label{font-family:'JetBrains Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.alloc-info-item .value{font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:500;}
.alloc-info-item .value.sprint{color:#8baaff;}
.alloc-info-item .value.pas{color:var(--accent);}
.alloc-info-item .value.formacao{color:#f07a7a;}
.alloc-info-divider{width:1px;height:40px;background:var(--border);}

/* ─── DAY PICKER ─── */
#day-picker{
  display:flex;gap:.5rem;align-items:center;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;padding:.6rem .9rem;margin-bottom:1.2rem;
  flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;
}
#day-picker::-webkit-scrollbar{display:none;}
.day-picker-label{
  font-family:'JetBrains Mono',monospace;font-size:.6rem;
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);
  white-space:nowrap;padding-right:.6rem;
  border-right:1px solid var(--border);margin-right:.2rem;
  flex-shrink:0;
}
.dpbtn{
  font-family:'JetBrains Mono',monospace;font-size:.7rem;
  padding:.4rem .85rem;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  transition:all .18s;white-space:nowrap;flex-shrink:0;
  letter-spacing:.04em;
  /* touch target mínimo 44px */
  min-height:36px;
}
.dpbtn:hover{border-color:var(--accent);color:var(--accent);}
.dpbtn.dp-active{
  background:var(--accent);border-color:var(--accent);
  color:var(--bg);font-weight:700;
}
.dpbtn.dp-today::after{
  content:'★';font-size:.55rem;margin-left:.3rem;
  vertical-align:super;color:var(--bg);
}
.dpbtn:not(.dp-active).dp-today::after{color:var(--accent);}

/* Day section in daily view */
#daily-day-content{transition:opacity .15s;}
#daily-day-content.fading{opacity:0;}

/* Foco de Estudo card */
.foco-card{
  border-radius:10px;padding:.85rem 1.1rem;margin-bottom:1rem;
  border:1px solid var(--border2);
  background:linear-gradient(135deg,var(--surface2) 0%,#16181c 100%);
}
.foco-card.foco-highlight{
  border-color:var(--accent);
  background:linear-gradient(135deg,#1e1a0f 0%,#16181c 100%);
}
.foco-label{
  font-family:'JetBrains Mono',monospace;font-size:.58rem;
  text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
  margin-bottom:.35rem;
}
.foco-task{
  font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;
  line-height:1.3;
}
.foco-meta{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  color:var(--muted);margin-top:.3rem;
}

/* ─── CERT PHASES ─── */
.cert-phase{margin-bottom:1.4rem;}
.cert-phase-header{
  display:flex;align-items:center;gap:.6rem;
  padding:.5rem .8rem;border-radius:8px;
  margin-bottom:.5rem;
  background:var(--surface2);border:1px solid var(--border2);
}
.cert-phase-tag{
  font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700;
  padding:.15rem .5rem;border-radius:4px;letter-spacing:.08em;
  text-transform:uppercase;
}
.cert-phase-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:var(--text);}
.cert-phase-dates{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);margin-left:auto;}

/* ─── RESPONSIVE ─── */
@media(max-width:1100px){
  .itrack{grid-template-columns:repeat(5,1fr);}
}
@media(max-width:900px){
  .itrack{grid-template-columns:repeat(4,1fr);}
}
@media(max-width:768px){
  body{font-size:.9rem;}
  .wrap{padding:1rem;}
  header{flex-direction:column;align-items:flex-start;gap:1rem;}
  h1{font-size:2.4rem;}
  .legend{justify-content:flex-start;}

  /* Grids → coluna única total */
  .objs{grid-template-columns:1fr;}
  .itrack{grid-template-columns:repeat(2,1fr);}
  .grid2{grid-template-columns:1fr;}
  .pgrid{grid-template-columns:1fr;}
  .dtopics-grid{grid-template-columns:repeat(2,1fr);}

  /* Today banner */
  #today-banner{grid-template-columns:1fr;}
  .today-alloc{text-align:left;margin-top:.5rem;}

  /* Alloc info */
  .alloc-info{gap:.8rem;flex-wrap:wrap;}
  .alloc-info-divider{display:none;}

  /* Cert */
  .cert-hours{gap:.4rem;}

  /* Calendário compacto */
  .mgrid{grid-template-columns:repeat(7,1fr);gap:1px;}
  .dc{min-height:60px;padding:.3rem;}
  .ch{font-size:.5rem;padding:1px 3px;}
  .dn{font-size:.6rem;}
  .mh{font-size:.55rem;}

  /* ── TABS: passam a menu horizontal sticky no topo ── */
  .tabs{
    display:flex !important;          /* sobrepõe o display:none anterior */
    flex-direction:row;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    position:sticky;
    top:0;
    z-index:100;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:.4rem .5rem;
    gap:.35rem;
    margin-bottom:1rem;
    margin-left:-1rem;
    margin-right:-1rem;
    padding-left:1rem;
    padding-right:1rem;
    scrollbar-width:none;             /* Firefox */
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex-shrink:0;
    font-size:.65rem;
    padding:.35rem .7rem;
    white-space:nowrap;
  }

  /* Esconde o dropdown mobile (já não é necessário) */
  .tabs-mobile{display:none;}

  /* Day Picker sticky no mobile */
  #day-picker{
    position:sticky;
    top:48px;           /* abaixo das tabs sticky */
    z-index:99;
    border-radius:0;
    margin-left:-1rem;
    margin-right:-1rem;
    border-left:none;border-right:none;border-top:none;
    gap:12px;           /* gap generoso para touch */
    padding:8px 1rem;   /* padding confortável */
  }
  .dpbtn{
    font-size:.72rem;
    padding:.5rem 1rem;    /* touch target fácil */
    min-height:40px;
  }
}
@media(max-width:480px){
  h1{font-size:2rem;}
  .itrack{grid-template-columns:1fr 1fr;}
  .mgrid .mh{font-size:.5rem;}
  .dn{font-size:.62rem;}
}

/* ─── .is-done — estado de bloco concluído na timeline ─── */
/* Aplicado por JS quando isDone=true: isPast OU (isToday && hora passada) */
.tl-row.is-done {
  opacity: .5;
  text-decoration: line-through;
  text-decoration-color: var(--muted2);
  filter: grayscale(.4);
}
</style>

<script>
/* ══════════════════════════════════════════════════════════
   MOTOR JAVASCRIPT — planner-abril-2026 v20
   Todas as datas derivam de new Date() em runtime.
   Para adicionar semanas: editar PLANNER_DB.settings.weekStarts
   ══════════════════════════════════════════════════════════ */

/* ── 0. REFERÊNCIAS DOM CRÍTICAS (declaradas antes de qualquer uso) ──
   tabsMobileSelect é referenciado em autoActivate() e switchView().
   Deve ser declarado aqui para evitar ReferenceError se autoActivate
   correr antes da linha onde estava originalmente declarado.
   ── */
const tabsMobileSelect = document.getElementById('tabs-mobile-select');

/* ── 1. UTILITÁRIOS DE DATA ── */
const hoje     = new Date();
const todayISO = (() => {
  const y = hoje.getFullYear();
  const m = String(hoje.getMonth()+1).padStart(2,'0');
  const d = String(hoje.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
})();
const todayDay   = hoje.getDate();
const todayMonth = hoje.getMonth();   /* 0-indexed */
const todayYear  = hoje.getFullYear();
const todayDow   = hoje.getDay();     /* 0=Dom … 6=Sáb */

const PT_MONTHS  = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                    "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const PT_DAYS    = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira",
                    "Quinta-feira","Sexta-feira","Sábado"];
const PT_DAYS_SH = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const WEEKDAY_LABELS = ["Seg","Ter","Qua","Qui","Sex"];

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fromISO(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function addDays(iso, n) {
  const d = fromISO(iso);
  d.setDate(d.getDate() + n);
  return toISO(d);
}
function isMarch2026() { return todayMonth === 2 && todayYear === 2026; }

/* ── 2. SINCRONIZAÇÃO DE SEMANA
   Usa PLANNER_DB.settings.weekStarts (segunda-feira de cada semana).
   Constrói WEEK_MAP dinamicamente: cada entrada cobre Mon → Dom seguinte.
   currentWeekId: semana que contém hoje.
   currentDayIdx: 0=Seg … 4=Sex; -1 se fim de semana.
   ── */
const WS = PLANNER_DB.settings.weekStarts; /* { 'w4_mar':'2026-03-23', … } */
const WD = PLANNER_DB.settings.weekDates;  /* tabela legada — mantida para compatibilidade */

/* Constrói WEEK_MAP: { id: {start, end} } — uma entrada por semana */
const WEEK_MAP = (() => {
  const map  = {};
  const keys = Object.keys(WS);
  keys.forEach((key, i) => {
    const start   = WS[key];
    const nextKey = keys[i + 1];
    /* Fim da semana = dia antes do início da seguinte, ou Domingo (+6) */
    const end     = nextKey ? addDays(WS[nextKey], -1) : addDays(start, 6);
    map[key] = { start, end };
  });
  /* Adiciona semanas de weekDates que não estejam em weekStarts */
  if (WD) {
    Object.keys(WD).forEach(key => {
      if (!map[key]) {
        const start = WD[key];
        map[key]    = { start, end: addDays(start, 6) };
      }
    });
  }
  return map;
})();

/* TAB_TO_WD_KEY: mapeia IDs dos tabs → chaves de WEEK_MAP */
const TAB_TO_WD_KEY = {
  'w1':'w1_mar','w2':'w2_mar','w3':'w3_mar','w4':'w4_mar',
  'w5':'w1_abr','w6':'w2_abr','w7':'w3_abr','w8':'w4_abr','w9':'w1_mai',
};
/* Adiciona entradas de weekStarts automaticamente */
Object.keys(WS).forEach(k => { TAB_TO_WD_KEY[k] = k; });

/* currentWeekId: percorre WEEK_MAP e encontra a semana que contém todayISO */
function getCurrentWeekId() {
  for (const [id, rng] of Object.entries(WEEK_MAP)) {
    if (todayISO >= rng.start && todayISO <= rng.end) return id;
  }
  const keys = Object.keys(WEEK_MAP);
  if (todayISO < WEEK_MAP[keys[0]].start) return keys[0];
  return keys.at(-1);
}

/* currentDayIdx: 0=Seg … 4=Sex; -1 se Sáb/Dom */
function getCurrentDayIndex() {
  if (todayDow === 0 || todayDow === 6) return -1;
  return todayDow - 1;
}

const currentWeekId = getCurrentWeekId();
const currentDayIdx = getCurrentDayIndex();
let   activeDayIdx  = currentDayIdx >= 0 ? currentDayIdx : 0;

/* Retorna ISO do dia útil dayIdx (0=Seg) da semana que contém refISO */
function getWeekdayISO(refISO, dayIdx) {
  const ref  = fromISO(refISO);
  const dow  = ref.getDay();
  const mon  = new Date(ref);
  mon.setDate(ref.getDate() - (dow === 0 ? 6 : dow - 1));
  const tgt  = new Date(mon);
  tgt.setDate(mon.getDate() + dayIdx);
  return toISO(tgt);
}

/* ── 3. MOTOR DE ALOCAÇÃO ── */
function getAllocation(dateISO) {
  const r   = PLANNER_DB.allocRules;
  const lbl = PLANNER_DB.settings.allocationRules;

  if (r.formacao.days.includes(dateISO))
    return { type:'formacao', label: lbl.training_days,
             badge:'alloc-formacao', sprint:null, pas:null };
  if (dateISO >= r.mixed.from)
    return { type:'mixed', label: lbl.post_april_6,
             badge:'alloc-sprint',
             sprint: lbl.post_april_6.split('/')[0].trim(),
             pas:    lbl.post_april_6.split('/')[1]?.trim() || '40% PAS' };
  return   { type:'sprint', label: lbl.pre_april,
             badge:'alloc-sprint', sprint: lbl.pre_april, pas:null };
}
const todayAlloc = getAllocation(todayISO);

/* ── 4. HELPERS DE RENDERIZAÇÃO ── */
function renderNote(n) {
  return `<div class="note ${n.cls}"><div class="nl">${n.label}</div>${n.txt}</div>`;
}
function renderRow(r) {
  return `<div class="tb"><div class="tt">${r.t}</div><div class="tc ${r.cls}">${r.txt}</div></div>`;
}
function renderSection(s) {
  let h = s.shLabel ? `<div class="sh ${s.shCls}">${s.shLabel}</div>` : '';
  (s.rows  || []).forEach(r => h += renderRow(r));
  (s.notes || []).forEach(n => h += renderNote(n));
  return h;
}
function renderCard(c) {
  let inner = `<h3>${c.title}</h3>`;
  (c.sections || []).forEach(s => inner += renderSection(s));
  return `<div class="card">${inner}</div>`;
}

/* ── 5. HEADER & LEGEND ── */
document.getElementById('header-sub').textContent = PLANNER_DB.meta.subtitle;
/* Título dinâmico: mês corrente */
(function updateHeaderTitle() {
  const h1 = document.getElementById('header-title');
  if (h1) h1.innerHTML = `${PT_MONTHS[todayMonth]} <em>${todayYear}</em>`;
})();

 {color:'#5be87a',label:'Certificação'},{color:'#e85b5b',label:'Bloqueado'},
 {color:'#9b5be8',label:'Descanso'}].forEach(l => {

   ★ injetado na semana actual via TAB_TO_WD_KEY + currentWeekId

function tabMatchesCurrent(tabId) {
  const wdKey = TAB_TO_WD_KEY[tabId] || tabId;
  return wdKey === currentWeekId;
}

const tabsDesktop = document.getElementById('tabs-desktop');
/* tabsMobileSelect declarado no topo do script (secção 0) */

PLANNER_DB.weeks.forEach((w, i) => {
  const isCurrent = tabMatchesCurrent(w.id);
  /* ★ apenas na semana actual — nunca estático */
  const label     = isCurrent ? `★ ${w.label}` : w.label;

  const btn = document.createElement('button');
  btn.className = 'tab' + (i === 0 ? ' on' : '');
  btn.textContent = label;
  btn.dataset.weekId = w.id;
  btn.onclick = () => switchView(w.id, btn);
  tabsDesktop.appendChild(btn);

  const opt = document.createElement('option');
  opt.value = w.id; opt.textContent = label;
  tabsMobileSelect.appendChild(opt);
});

function switchView(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('view-' + id).classList.add('on');
  if (btn) btn.classList.add('on');
  tabsMobileSelect.value = id;
  document.getElementById('day-picker').style.display = (id === 'daily') ? 'flex' : 'none';

  /* Re-renderiza o calendário ao clicar na tab Mês — evita duplicação */
  if (id === 'month') { renderCalendarsGrid(); return; }

  /* Ao mudar de semana na sidenav, a timeline atualiza para a Seg dessa semana. */
  if (id === 'daily') {
    renderDashboardDay(activeDayIdx, getWeekdayISO(todayISO, activeDayIdx));
  } else {
    /* Ao navegar para semana específica via tab, atualiza activeDayIdx para Seg */
    const wdKey   = TAB_TO_WD_KEY[id] || id;
    const wkRange = WEEK_MAP[wdKey];
    if (wkRange) {
      /* Segunda-feira dessa semana */
      const mondayISO = wkRange.start;
      activeDayIdx    = 0;
      /* ★ FIX 2+3 — Day Picker usa weekStart da semana seleccionada;
         labels mostram dia+mês curtos (ex: "Seg 30 Mar", "Qua 01 Abr") */
      document.querySelectorAll('.dpbtn').forEach((b, idx) => {
        const dISO  = addDays(mondayISO, idx);
        const dDate = fromISO(dISO);
        b.dataset.iso = dISO;

        const certEvt = (PLANNER_DB.calendarEvents || []).find(ev => ev.iso === dISO);
        const holiday = (PLANNER_DB.holidays       || []).find(h  => (h.iso||h.date) === dISO);
        let suffix = '';
        if      (certEvt && certEvt.highlight) suffix = ' 🏆';
        else if (certEvt)                      suffix = ' 📚';
        else if (holiday)                      suffix = ' 🏖️';

        /* ★ FIX 3 — label com dia e mês curto */
        const dayNum = String(dDate.getDate()).padStart(2,'0');
        const monSh  = PT_MONTHS[dDate.getMonth()].slice(0,3);
        b.textContent = `${WEEKDAY_LABELS[idx]} ${dayNum} ${monSh}${suffix}`;
        b.title = certEvt ? certEvt.label : (holiday ? holiday.name : dISO);
        b.classList.toggle('dp-active', idx === 0);
      });
      /* Render timeline for Monday of the selected week immediately */
      renderDashboardDay(0, mondayISO);
    }
  }
}

/* ── 11. DAY PICKER ──
   ★ FIX 2: usa o weekStart da semana actual (currentWeekId via WEEK_MAP)
   em vez de calcular a partir de todayISO.
   Garante que a semana 30 Mar–5 Abr gera os 7 dias corretos mesmo
   quando o mês muda a meio da semana.
   ★ FIX 3: botões mostram "Seg 30 Mar", "Ter 31 Mar", "Qua 01 Abr", etc.
   ── */
(function buildDayPicker() {
  const dp = document.getElementById('day-picker');

  /* ★ FIX 2 — obtém a segunda-feira da semana activa via WEEK_MAP */
  const activeWeekRange = WEEK_MAP[currentWeekId];
  const weekMonday = activeWeekRange ? activeWeekRange.start : getWeekdayISO(todayISO, 0);

  WEEKDAY_LABELS.forEach((lbl, idx) => {
    /* ★ FIX 2 — deriva os 5 dias úteis a partir de weekMonday */
    const dayISO  = addDays(weekMonday, idx);
    const dDate   = fromISO(dayISO);
    const isToday = (dayISO === todayISO);

    const certEvt = (PLANNER_DB.calendarEvents || []).find(ev => ev.iso === dayISO && ev.chipCls === 'cc');
    const anyEvt  = (PLANNER_DB.calendarEvents || []).find(ev => ev.iso === dayISO);
    const holiday = (PLANNER_DB.holidays       || []).find(h  => (h.iso||h.date) === dayISO);

    const btn     = document.createElement('button');
    btn.className = 'dpbtn' +
                    (idx === activeDayIdx ? ' dp-active' : '') +
                    (isToday             ? ' dp-today'  : '');

    let suffix = '';
    if      (certEvt && certEvt.highlight) suffix = ' 🏆';
    else if (certEvt)                      suffix = ' 📚';
    else if (anyEvt  && anyEvt.chipCls !== 'cc') suffix = ' 📅';
    else if (holiday)                      suffix = ' 🏖️';

    /* ★ FIX 3 — formato "Seg 30 Mar" em vez de apenas "Seg" */
    const dayNum = String(dDate.getDate()).padStart(2,'0');
    const monSh  = PT_MONTHS[dDate.getMonth()].slice(0,3);
    btn.textContent    = `${lbl} ${dayNum} ${monSh}${suffix}`;
    btn.title          = anyEvt ? (PLANNER_DB.calendarEvents||[]).filter(ev=>ev.iso===dayISO).map(ev=>ev.label).join(' · ') : (holiday ? holiday.name : dayISO);
    btn.dataset.dayIdx = idx;
    btn.dataset.iso    = dayISO;
    btn.onclick = () => selectDay(idx, btn);
    dp.appendChild(btn);
  });
})();

function selectDay(idx, btn) {
  activeDayIdx = parseInt(idx);   /* parseInt — garante número inteiro na memória */
  document.querySelectorAll('.dpbtn').forEach(b => b.classList.remove('dp-active'));
  btn.classList.add('dp-active');
  /* Usa o ISO armazenado no dataset do botão — reflecte sempre a semana correcta */
  const dayISO = btn.dataset.iso || getWeekdayISO(todayISO, activeDayIdx);
  renderDashboardDay(activeDayIdx, dayISO);
}


/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   GETTIME LINEFORDATE — o "Cérebro" da timeline  (v18)
   Recebe dateISO "YYYY-MM-DD" e devolve:
   { title, sub, rows:[{time,cls,text}], notes:[{cls,label,text}] }

   ★ v18 — LEITURA DUPLA (tasks + calendarEvents):
   Para cada dia útil, após as linhas fixas de estrutura (manhã,
   almoço, ginásio, descanso), o motor injeta TODOS os calendarEvents
   cujo iso === dateISO como linhas da timeline com o horário real
   extraído do label ("08:00–10:00 PAS" → time="08:00–10:00", texto="PAS").
   Desta forma 02/04 (PAS + 883) e 04/04 (Mecânico + BBQ) aparecem
   automaticamente sem duplicar dados.
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function getTimelineForDate(dateISO) {
  const alloc = getAllocation(dateISO);

  const dateObj  = fromISO(dateISO);
  const todayObj = fromISO(todayISO);
  const isPast   = dateObj.getTime() < todayObj.getTime();

  /* ── Lookup 1: Feriados ── */
  const holiday = (PLANNER_DB.holidays || []).find(
    h => (h.iso || h.date) === dateISO);

  /* ── Lookup 2 (v18): TODOS os calendarEvents do dia ──
     Agrupa todos — não só o primeiro cert. */
  const dayCalEvts = (PLANNER_DB.calendarEvents || []).filter(
    ev => ev.iso === dateISO);

  /* Para o bloco de estudo das 20h: evento de cert (chipCls==='cc') */
  const certEvt = dayCalEvts.find(ev => ev.chipCls === 'cc') || null;

  /* ── Lookup 3: Issues agendados para este dia ── */
  const isMondayTimeline = (fromISO(dateISO).getDay() === 1);

  function matchesPT(text, iso) {
    const M = {jan:'01',fev:'02',mar:'03',abr:'04',mai:'05',jun:'06',
               jul:'07',ago:'08',set:'09',out:'10',nov:'11',dez:'12'};
    const m = text.match(/(\d{1,2})\s+([A-Za-z\u00C0-\u00FF]{3})/);
    if (!m) return false;
    const key = m[2].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').slice(0,3);
    const mon = M[key];
    if (!mon) return false;
    return iso === `${iso.slice(0,4)}-${mon}-${m[1].padStart(2,'0')}`;
  }
  const dayIssues = (PLANNER_DB.issues || []).filter(iss => {
    if (isMondayTimeline && iss.done) return false;
    if (iss.done) return false;
    const h = `${iss.date||''} ${iss.prev||''}`;
    return h.includes(dateISO) || matchesPT(h, dateISO);
  });

  /* ★ v18 — Helper: extrai time e texto de um label de calendarEvent.
     Formato esperado: "HH:MM–HH:MM Descrição" ou "HH:MM Descrição"
     Devolve { time, text, startHour } ou null se não houver horário. */
  function parseCalEvtLabel(label) {
    /* Tenta "HH:MM–HH:MM texto" */
    const m1 = label.match(/^(\d{1,2}:\d{2}[–\-]\d{1,2}:\d{2})\s+(.*)/);
    if (m1) {
      const startH = parseInt(m1[1].split(/[–\-]/)[0].split(':')[0], 10);
      return { time: m1[1], text: m1[2].trim(), startHour: startH };
    }
    /* Tenta "HH:MM texto" */
    const m2 = label.match(/^(\d{1,2}:\d{2})\s+(.*)/);
    if (m2) {
      const startH = parseInt(m2[1].split(':')[0], 10);
      return { time: m2[1], text: m2[2].trim(), startHour: startH };
    }
    return null;
  }

  /* ★ v18 — Classifica um calendarEvent numa classe de cor da timeline */
  function calEvtClass(ev) {
    if (ev.chipCls === 'cc') return 'tc-study';
    if (ev.chipCls === 'cn') return 'tc-work';   /* 883 */
    if (ev.chipCls === 'cp') return 'tc-pas';    /* PAS */
    if (ev.chipCls === 'cw') return 'tc-work';   /* Trabalho */
    if (ev.chipCls === 'cb') return 'tc-formacao'; /* Bloqueado/pessoal */
    if (ev.chipCls === 'cr') return 'tc-rest';   /* Descanso/pessoal */
    return 'tc-issue';
  }

  const rows  = [];
  const notes = [];

  /* ════ CASO 1: FERIADO ════ */
  if (holiday) {
    const isOpt = holiday.type === 'optional';
    rows.push({ time:'🌴 Dia Livre', cls:'tc-holiday',
      text:`<strong>${holiday.name}</strong>${isOpt?' <em>(opcional)</em>':''} — Descanso Total`,
      past: isPast });
    rows.push({ time:'Nota', cls:'tc-rest',
      text:'Desligar completamente. Sprint e PAS suspensos.',
      past: isPast });

    /* ★ v18: mesmo nos feriados, eventos pessoais (Mecânico, BBQ…) injectados */
    const personalEvts = dayCalEvts.filter(ev => ev.chipCls !== 'cc');
    if (personalEvts.length) {
      personalEvts.forEach(ev => {
        const parsed = parseCalEvtLabel(ev.label);
        if (parsed) {
          rows.push({ time: parsed.time, cls: calEvtClass(ev),
            text: parsed.text, startHour: parsed.startHour, past: isPast });
        } else {
          rows.push({ time:'—', cls: calEvtClass(ev), text: ev.label, past: isPast });
        }
      });
      notes.push({ cls:'tn-gold', label:'📅 Eventos do dia',
        text: personalEvts.map(ev => ev.label).join('<br>') });
    }

    notes.push({ cls:'tn-green', label:`🌴 ${holiday.name}`,
      text: isOpt
        ? 'Feriado municipal — confirma disponibilidade com a equipa.'
        : 'Feriado nacional. Sprint e PAS suspensos.' });
    const d = fromISO(dateISO);
    return {
      title: holiday.name,
      sub: `🌴 Feriado · ${d.getDate()} ${PT_MONTHS[d.getMonth()].slice(0,3)}`,
      isPast, isHoliday: true, rows, notes
    };
  }

  /* ════ CASO 2: FIM DE SEMANA ════ */
  const dow = fromISO(dateISO).getDay();
  if (dow === 0 || dow === 6) {
    /* ★ v18: Sábado/Domingo com eventos do calendarEvents injectados */
    if (dayCalEvts.length) {
      dayCalEvts.forEach(ev => {
        const parsed = parseCalEvtLabel(ev.label);
        if (parsed) {
          rows.push({ time: parsed.time, cls: calEvtClass(ev),
            text: parsed.text, startHour: parsed.startHour, past: isPast });
        } else {
          rows.push({ time:'—', cls: calEvtClass(ev), text: ev.label, past: isPast });
        }
      });
      notes.push({ cls:'tn-gold', label:'📅 Eventos do fim de semana',
        text: dayCalEvts.map(ev => ev.label).join('<br>') });
    } else {
      rows.push({ time:'Dia inteiro', cls:'tc-rest',
        text:'🌿 Descanso / Fim de Semana', past: isPast });
    }
    const d2 = fromISO(dateISO);
    return {
      title: dayCalEvts.length
        ? `${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][dow]} ${d2.getDate()} ${PT_MONTHS[d2.getMonth()].slice(0,3)}`
        : 'Fim de Semana',
      sub: dateISO, isPast, rows, notes
    };
  }

  /* ════ CASO 3: DIA ÚTIL — leitura dupla (tasks + calendarEvents) ════ */
  const d      = fromISO(dateISO);
  const dow_pt = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  const allocLabel = alloc.label;
  const title = `${dow_pt[d.getDay()]} ${d.getDate()} ${PT_MONTHS[d.getMonth()].slice(0,3)}`;

  /* ★ v18 — Separa calendarEvents em "com horário explícito" vs "sem horário"
     Os que têm horário substituem as linhas genéricas do bloco correspondente.
     Os que não têm horário (ex: "📚 D6 · Grounding") ficam no slot 20h. */
  const timedEvts = dayCalEvts
    .map(ev => ({ ev, parsed: parseCalEvtLabel(ev.label) }))
    .filter(x => x.parsed !== null)
    .sort((a, b) => a.parsed.startHour - b.parsed.startHour);

  const untimedEvts = dayCalEvts.filter(ev => parseCalEvtLabel(ev.label) === null);

  /* Se há eventos com horário para este dia útil, usa modo "agenda" (injecta tudo) */
  const hasExplicitSchedule = timedEvts.length > 0;

  if (hasExplicitSchedule) {
    /* ── Modo Agenda: linhas fixas de abertura + todos os eventos do calendarEvents ── */
    rows.push({ time:'07:00–08:00', cls:'tc-meal',
      text:'🐕 Passeio + Pequeno-almoço', past: isPast });

    /* Injeta todos os eventos com horário por ordem */
    timedEvts.forEach(({ ev, parsed }) => {
      rows.push({
        time: parsed.time,
        cls: calEvtClass(ev),
        text: parsed.text,
        startHour: parsed.startHour,
        past: isPast
      });
    });

    /* Almoço — apenas se não coberto por evento explícito */
    const coversLunch = timedEvts.some(x => x.parsed.startHour >= 13 && x.parsed.startHour <= 14);
    if (!coversLunch) {
      rows.push({ time:'13:00–14:00', cls:'tc-meal',
        text:'🍽️ Almoço / Descompressão — inegociável, sem ecrã', past: isPast });
    }

    /* Ginásio / Descanso / Estudo — apenas se não houver evento explícito cobrindo esse slot */
    const coversGym    = timedEvts.some(x => x.parsed.startHour >= 17 && x.parsed.startHour <= 18);
    const coversEvening= timedEvts.some(x => x.parsed.startHour >= 18 && x.parsed.startHour <= 20);
    const coversStudy  = timedEvts.some(x => x.parsed.startHour >= 20 && x.parsed.startHour <= 21);

    if (!coversGym)
      rows.push({ time:'17:00–18:00', cls:'tc-meal', text:'🏋️ Ginásio — inegociável', past: isPast });
    if (!coversEvening)
      rows.push({ time:'18:00–20:00', cls:'tc-rest', text:'🌿 Bloco pessoal — jantar, cadela, desligar', past: isPast });

    /* Slot 20h: eventos sem horário (ex: 📚 D6) OU fallback */
    if (!coversStudy) {
      if (untimedEvts.length) {
        const ue = untimedEvts[0];
        const isHL = !!ue.highlight;
        rows.push({ time:'20:00–21:00', cls: isHL ? 'tc-formacao' : 'tc-study',
          text: isHL ? `🏆 <strong>${ue.label}</strong>` : `📚 ${ue.label}`,
          past: isPast, isCert: true });
        notes.push({ cls: isHL ? 'tn-gold' : 'tn-blue',
          label: isHL ? '🏆 Exame — ALVO' : '🎓 Foco de Estudo', text: ue.label });
      } else {
        rows.push({ time:'20:00–21:00', cls:'tc-rest',
          text:'🌿 Descanso — sem estudo esta noite', past: isPast });
      }
    }

    rows.push({ time:'21:00–22:00', cls:'tc-rest', text:'📝 Revisão do dia / Notas pessoais', past: isPast });
    rows.push({ time:'22:00+', cls:'tc-rest', text:'🌙 Descanso — sem ecrãs exigentes', past: isPast });

    /* Note de alocação */
    if (alloc.type === 'mixed') {
      notes.push({ cls:'tn-blue', label:'🔄 Alocação', text:`${allocLabel} — regra a partir de 6 Abr.` });
    }
    notes.push({ cls:'tn-gold', label:'📅 Eventos do Dia',
      text: timedEvts.map(x => x.ev.label).join('<br>') });

    if (dayIssues.length) {
      notes.push({ cls:'tn-gold', label:'📋 Issues Agendados',
        text: dayIssues.map(i =>
          `<strong>${i.id}</strong> — ${i.typeLabel} · ${i.est}`
        ).join('<br>') });
    }

    return { title, sub: allocLabel, isPast, rows, notes };
  }

  /* ── Modo Rotina Padrão (sem eventos explícitos com horário) ── */
  rows.push({ time:'07:00–08:00', cls:'tc-meal',
    text:'🐕 Passeio + Pequeno-almoço', past: isPast });
  rows.push({ time:'08:00–09:00', cls:'tc-meal',
    text:'☕ Preparação — email, JIRA, planeamento', past: isPast });

  if (alloc.type === 'formacao') {
    rows.push({ time:'09:00–17:00', cls:'tc-formacao',
      text:`🎓 ${allocLabel}`, past: isPast });
    notes.push({ cls:'tn-red', label:'🎓 Formação',
      text:'Dia completo de formação oficial. Sprint e PAS suspensos.' });
  } else {
    let mainText = alloc.type === 'mixed'
      ? `💻 Sprint 60% — ${alloc.sprint}`
      : `💻 ${allocLabel}`;

    if (dayIssues.length) {
      const ids = dayIssues.map(i => {
        const ico = i.type==='ic-bug'?'🐛':i.type==='ic-imp'?'⚡':i.type==='ic-tst'?'🔵':'🟢';
        return `${ico} [#${i.id}]`;
      }).join(' · ');
      mainText += `  ·  ${ids}`;
      notes.push({ cls:'tn-gold', label:'📋 Issues Agendados',
        text: dayIssues.map(i =>
          `<strong>${i.id}</strong> — ${i.typeLabel} · ${i.est}`
        ).join('<br>')
      });
    }
    rows.push({ time:'09:00–13:00', cls:'tc-work', text: mainText, past: isPast });
  }

  rows.push({ time:'13:00–14:00', cls:'tc-meal',
    text:'🍽️ Almoço / Descompressão — inegociável, sem ecrã', past: isPast });

  if (alloc.type !== 'formacao') {
    if (alloc.type === 'mixed') {
      const pddIss = dayIssues.filter(i => i.type === 'ic-pdd');
      const pasText = pddIss.length
        ? `🆕 ${alloc.pas} — 🟢 [#${pddIss.map(i=>i.id).join(' · #')}]`
        : `🆕 ${alloc.pas} — Desenvolvimento / Revisão`;
      rows.push({ time:'14:00–17:00', cls:'tc-pas', text: pasText, past: isPast });
      notes.push({ cls:'tn-blue', label:'🔄 Alocação',
        text:`${allocLabel} — regra a partir de 6 Abr.` });
    } else {
      const sprintTxt = dayIssues.length
        ? `💻 Sprint — ${dayIssues.map(i=>i.id).join(' · ')}`
        : '💻 Sprint — Foco em pendentes / revisão';
      rows.push({ time:'14:00–17:00', cls:'tc-work', text: sprintTxt, past: isPast });
    }

    rows.push({ time:'17:00–18:00', cls:'tc-meal',
      text:'🏋️ Ginásio — inegociável', past: isPast });

    rows.push({ time:'18:00–20:00', cls:'tc-rest',
      text:'🌿 Bloco pessoal — jantar, cadela, desligar', past: isPast });

    /* Slot 20h: evento de cert (chipCls==='cc' sem horário) ou fallback */
    if (certEvt && !parseCalEvtLabel(certEvt.label)) {
      const isHL = !!certEvt.highlight;
      rows.push({
        time:'20:00–21:00',
        cls: isHL ? 'tc-formacao' : 'tc-study',
        text: isHL ? `🏆 <strong>${certEvt.label}</strong>` : `📚 ${certEvt.label}`,
        past: isPast, isCert: true
      });
      notes.push({
        cls: isHL ? 'tn-gold' : 'tn-blue',
        label: isHL ? '🏆 Exame — ALVO' : '🎓 Foco de Estudo',
        text: certEvt.label
      });
    } else {
      rows.push({ time:'20:00–21:00', cls:'tc-rest',
        text:'🌿 Descanso — sem estudo esta noite', past: isPast });
    }

    rows.push({ time:'21:00–22:00', cls:'tc-rest',
      text:'📝 Revisão do dia / Notas pessoais', past: isPast });
    rows.push({ time:'22:00+', cls:'tc-rest',
      text:'🌙 Descanso — sem ecrãs exigentes', past: isPast });
  }

  return { title, sub: allocLabel, isPast, rows, notes };
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RENDERTIMELINE — monta o HTML da timeline
   isDone por row: isPast OU (isToday E startHour < currentHour)
   A classe .is-done aplica opacity:.5 · grayscale · line-through via CSS.
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderTimeline(dateISO) {
  const tl          = getTimelineForDate(dateISO);
  const alloc       = getAllocation(dateISO);

  /* ★ FIX 1 — re-verifica isPast com Date objects (defesa em profundidade).
     tl.isPast já usa fromISO, mas a comparação aqui é a fonte de verdade
     para isDone e os banners visuais. */
  const dateObj  = fromISO(dateISO);
  const todayObj = fromISO(todayISO);
  const isPast   = dateObj.getTime() < todayObj.getTime();
  const isToday  = (dateISO === todayISO);
  const isFuture = !isPast && !isToday;
  const currentHour = new Date().getHours();

  /* ── Feriado: card de destaque, sem timeline de trabalho ── */
  if (tl.isHoliday) {
    const r = tl.rows[0] || {};
    const n = tl.notes[0] || {};
    return `
      <div class="tl-day-title">
        ${tl.title}
        <span>${tl.sub}</span>
      </div>
      <div style="background:var(--a4)14;border:2px solid var(--a4)44;border-radius:12px;
           padding:2rem;text-align:center;${isPast?'opacity:.5;':''}">
        <div style="font-size:2.5rem;margin-bottom:.6rem">🌴</div>
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;
             color:#7aef99;margin-bottom:.4rem">${r.text||''}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:.65rem;
             color:var(--muted)">${n.text||''}</div>
      </div>`;
  }

  /* ── Alloc badge — lê de allocationRules, sem texto hardcoded ── */
  const lbl = PLANNER_DB.settings.allocationRules;
  let allocBadgeHtml = '';
  if (alloc.type === 'mixed') {
    const parts = lbl.post_april_6.split('/');
    allocBadgeHtml =
      `<span class="tl-header-alloc" style="background:#5b8dee18;color:#8baaff;border:1px solid #5b8dee44">${parts[0].trim()}</span>` +
      `<span class="tl-header-alloc" style="background:#e8b84b18;color:var(--accent);border:1px solid #e8b84b44;margin-left:.3rem">${parts[1]?.trim()||'40% PAS'}</span>`;
  } else if (alloc.type === 'formacao') {
    allocBadgeHtml =
      `<span class="tl-header-alloc" style="background:#e85b5b18;color:#f07a7a;border:1px solid #e85b5b44">${lbl.training_days}</span>`;
  } else {
    allocBadgeHtml =
      `<span class="tl-header-alloc" style="background:#5b8dee18;color:#8baaff;border:1px solid #5b8dee44">${lbl.pre_april}</span>`;
  }

  /* ────────────────────────────────────────────────────────
     ROWS — isDone por bloco horário (TAREFA 1)

     const isDone = isPast || (isToday && rowHour < currentHour);

     · isPast   → dia anterior a hoje → tudo riscado sem excepção
     · isToday  → hoje → apenas blocos com startHour < currentHour
     · isFuture → isDone sempre false — nunca risca dias futuros

     rowHour: r.startHour ?? (r.past ? 0 : null)
       startHour presente → usa directamente
       r.past=true sem startHour → trata como hora 0 (risca em isPast)
       null sem past → não risca

     Classe CSS .is-done: opacity:.5 · grayscale(.4) · line-through
  ──────────────────────────────────────────────────────── */
  let rowsHtml = tl.rows.map(r => {
    const rowHour = r.startHour ?? (r.past ? 0 : null);
    const isDone  = isPast || (isToday && rowHour !== null && rowHour < currentHour);
    return `<div class="tl-row${isDone ? ' is-done' : ''}">
       <div class="tl-time">${r.time}</div>
       <div class="tl-content ${r.cls}">${r.text}</div>
     </div>`;
  }).join('');

  if (!rowsHtml)
    rowsHtml = `<div class="tl-row"><div class="tl-time">—</div>
      <div class="tl-content tc-rest">Sem eventos registados</div></div>`;

  /* ── Notes sidebar ── */
  let notesHtml = tl.notes.map(n =>
    `<div class="tl-note ${n.cls}"><div class="nl">${n.label}</div>${n.text}</div>`
  ).join('');

  /* ── Correção 1: Nota de Backlog Clean (Segunda-feira) ──
     Se hoje for segunda-feira E houver issues done no PLANNER_DB,
     injeta nota informativa no painel lateral da timeline. */
  const isMondayDashboard = (fromISO(dateISO).getDay() === 1);
  if (isMondayDashboard) {
    const hiddenCount = (PLANNER_DB.issues || []).filter(i => i.done).length;
    if (hiddenCount > 0) {
      notesHtml += `<div class="tl-note tn-green">
        <div class="nl">🧹 Backlog Clean · Segunda-feira</div>
        <em>(Segunda-feira: ${hiddenCount} ${hiddenCount === 1 ? 'item concluído oculto' : 'itens concluídos ocultos'} da fila)</em>
        — Foco apenas em pendentes.
      </div>`;
    }
  }

  if (!notesHtml)
    notesHtml = `<div class="tl-note tn-blue">
      <div class="nl">💡 Tip</div>
      Adiciona um evento ao <code>calendarEvents</code> com o ISO deste dia
      e aparece automaticamente às 20h00 na timeline.
    </div>`;

  const pastBanner = isPast
    ? `<div style="font-family:'JetBrains Mono',monospace;font-size:.6rem;
         background:var(--border);color:var(--muted);border-radius:4px;
         padding:.2rem .6rem;margin-bottom:.75rem;display:inline-block;">
         ⏮ Dia anterior — registo histórico
       </div>` : '';

  const futureBanner = isFuture
    ? `<div style="font-family:'JetBrains Mono',monospace;font-size:.6rem;
         background:#5b8dee12;color:#8baaff;border:1px solid #5b8dee22;
         border-radius:4px;padding:.2rem .6rem;margin-bottom:.75rem;
         display:inline-block;">
         📅 Dia futuro — planeamento
       </div>` : '';

  return `
    <div class="tl-day-title">
      ${tl.title}${isToday ? ' <span style="color:var(--accent)">★ Hoje</span>' : ''}
      <span>${tl.sub}</span>
    </div>
    ${pastBanner}${futureBanner}
    <div class="tl-day-layout">
      <div class="timeline-wrap"${isPast?' style="opacity:.85;"':''}>
        <div class="tl-header">
          <span style="font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted)">
            ${dateISO}
          </span>
          <span style="display:flex;gap:.3rem;align-items:center">${allocBadgeHtml}</span>
        </div>
        ${rowsHtml}
      </div>
      <div class="tl-notes">${notesHtml}</div>
    </div>`;
}

/* ── 12. DASHBOARD / ROTINA DIÁRIA ──
   renderDashboardDay() — chamada ao carregar e ao clicar Day Picker.
   ★ v20 — JUNÇÃO ROBUSTA: combina PLANNER_DB.tasks[dayISO] (tarefas
   manuais) com PLANNER_DB.calendarEvents filtrados por dayISO.
   Regra: se tasks[dayISO] existe, usa tasks; se não existe MAS há
   calendarEvents para esse dia, usa calendarEvents como fonte.
   Isso garante que o BBQ de Sábado, os blocos PAS/883 e os eventos
   de estudo aparecem na rotina diária sem nunca duplicar dados.
   ── */
function renderDashboardDay(dayIdx, dayISO) {
  const container = document.getElementById('daily-day-content');

  /* ── Actualiza título do Dashboard ──
     Formato: "Agenda: Terça-feira, 7 de Abril de 2026" */
  const titleEl = document.getElementById('dashboard-title');
  if (titleEl) {
    const d       = fromISO(dayISO);
    const dow_pt  = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira',
                     'Quinta-feira','Sexta-feira','Sábado'];
    const isToday = (dayISO === todayISO);
    const fullDate = `${d.getDate()} de ${PT_MONTHS[d.getMonth()]} de ${d.getFullYear()}`;
    const todayMark = isToday ? ' <span style="color:var(--accent);font-size:.75em">★ hoje</span>' : '';
    titleEl.style.opacity = '0';
    setTimeout(() => {
      titleEl.innerHTML =
        `<span style="color:var(--muted2)">Agenda:</span> ` +
        `<span style="color:var(--text)">${dow_pt[d.getDay()]}, ${fullDate}</span>${todayMark}`;
      titleEl.style.opacity = '1';
    }, 80);
  }

  /* ── v21 — Merge tasks[] + calendarEvents[] com deduplicação e prefixo 📅 ──
     Fonte 1: PLANNER_DB.tasks[dayISO] — tarefas manuais
     Fonte 2: PLANNER_DB.calendarEvents filtrados por iso === dayISO
     Regra: se texto idêntico em ambas as fontes para o mesmo dia → mostra apenas uma vez.
     Itens vindos exclusivamente de calendarEvents recebem prefixo 📅. */
  const manualTasks = (PLANNER_DB.tasks && PLANNER_DB.tasks[dayISO]) || [];
  const calEvtsDay  = (PLANNER_DB.calendarEvents || []).filter(ev => ev.iso === dayISO);

  const manualLabels = new Set(manualTasks.map(t => (t.label || t.txt || '').slice(0, 20)));
  const extraFromCal = calEvtsDay
    .filter(ev => !manualLabels.has(ev.label.slice(0, 20)))
    .map(ev => ({ ...ev, label: ev.label.startsWith('📅') ? ev.label : `📅 ${ev.label}` }));
  const allDayItems  = [...manualTasks, ...extraFromCal];

  /* ── v21 FIX: limpa container imediatamente antes da transição
     Evita duplicação visual ao trocar de dia rapidamente (race condition
     entre dois setTimeout sobrepostos). */
  container.innerHTML = '';
  container.classList.add('fading');
  setTimeout(() => {
    container.innerHTML = renderTimeline(dayISO);
    container.classList.remove('fading');
  }, 120);
}

/* ── 13. CALENDÁRIO — renderCalendarsGrid() ──
   Versão multi-mês: gera automaticamente Março, Abril, Maio e Junho 2026.
   ─ Sem hardcode de startOffset nem daysInMonth: tudo calculado via new Date.
   ─ Cada mês tem o seu título e grelha Seg–Dom independente.
   ─ Última linha de cada grelha é sempre completada até 7 células.
   ─ PLANNER_DB.calendar.days é usado APENAS para Março (chips históricos).
   ─ Os restantes meses mostram feriados e calendarEvents dinamicamente.
── */
function renderCalendarsGrid() {
  const view = document.getElementById('view-month');

  /* ── 1. Limpeza explícita ── */
  view.innerHTML = '';

  /* ── 2. Índices globais O(1) ── */
  const holidayMap = {};
  (PLANNER_DB.holidays || []).forEach(h => { holidayMap[h.iso || h.date] = h; });

  /* certEvtMap: chave = "YYYY-MM-DD" → array de eventos */
  const certEvtMap = {};
  (PLANNER_DB.calendarEvents || []).forEach(ev => {
    if (!ev.iso) return;
    if (!certEvtMap[ev.iso]) certEvtMap[ev.iso] = [];
    certEvtMap[ev.iso].push(ev);
  });

  /* marChipsMap: chave = dia (número) → chips históricos de Março */
  const marChipsMap = {};
  (PLANNER_DB.calendar.days || []).forEach(day => {
    marChipsMap[day.d] = day.chips || [];
  });

  /* ── 3. Meses a renderizar ── */
  const MONTHS = [
    { year: 2026, month: 2,  label: 'Março 2026'  },   /* month: índice JS (0=Jan) */
    { year: 2026, month: 3,  label: 'Abril 2026'  },
    { year: 2026, month: 4,  label: 'Maio 2026'   },
    { year: 2026, month: 5,  label: 'Junho 2026'  }
  ];

  const PT_DOW_SHORT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  /* ── 4. Helper: calcula startOffset Mon-based ──
     JS getDay(): 0=Dom … 6=Sáb → queremos 0=Seg … 6=Dom */
  function mondayOffset(year, month) {
    const dow = new Date(year, month, 1).getDay(); /* 0=Dom */
    return (dow + 6) % 7; /* converte para base-segunda */
  }

  /* ── 5. Loop de meses ── */
  let fullHtml = '';

  MONTHS.forEach(({ year, month, label }) => {
    const daysInMonth  = new Date(year, month + 1, 0).getDate();
    const startOffset  = mondayOffset(year, month);
    const isMarch      = (month === 2 && year === 2026);
    const monthPadded  = String(month + 1).padStart(2, '0');
    const monthPrefix  = `${year}-${monthPadded}-`;

    /* Título do mês — sticky para manter contexto durante scroll */
    fullHtml += `<div style="
      font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;
      letter-spacing:-.02em;color:var(--text);
      margin:${isMarch ? '0' : '2rem'} 0 .75rem;
      padding:.5rem .75rem;
      border-bottom:1px solid var(--border);
      background:var(--bg);
      position:sticky;top:0;z-index:10;
    ">${label}</div>`;

    /* Cabeçalho de dias da semana */
    fullHtml += '<div class="mgrid">';
    ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].forEach(d =>
      fullHtml += `<div class="mh">${d}</div>`);

    /* Células vazias iniciais */
    for (let i = 0; i < startOffset; i++)
      fullHtml += '<div class="dc emp"></div>';

    /* Células dos dias */
    for (let d = 1; d <= daysInMonth; d++) {
      const dayISO  = `${monthPrefix}${String(d).padStart(2,'0')}`;
      const jsDate  = new Date(year, month, d);
      const dow     = jsDate.getDay();               /* 0=Dom, 6=Sáb */
      const isWE    = (dow === 0 || dow === 6);
      /* ★ Instrução 3: comparação robusta via todayISO (constante ISO string YYYY-MM-DD) */
      const isToday = (dayISO === todayISO);
      const hol     = holidayMap[dayISO];
      const evts    = certEvtMap[dayISO] || [];

      /* Classes da célula */
      let cls = 'dc';
      if (isWE)                    cls += ' we';
      if (isToday)                 cls += ' today-cell';
      if (hol)                     cls += ' is-holiday';
      if (evts.length && !isToday) cls += ' has-cert-event';

      const todayBadge = isToday
        ? `<span style="color:var(--accent);font-size:.58rem;margin-left:.25rem">★ hoje</span>`
        : '';

      const holChip = hol
        ? `<div class="holiday-chip">🏖️ ${hol.name}</div>`
        : '';

      /* Chips: Março usa dados históricos de PLANNER_DB.calendar.days */
      let chipsHtml = '';
      if (isMarch && marChipsMap[d]) {
        chipsHtml = marChipsMap[d].map(c =>
          `<div class="ch ${c.c}">${c.t}</div>`).join('');
      }

      /* Injeta calendarEvents (cert, exame, etc.) sem duplicar */
      evts.forEach(ev => {
        if (!chipsHtml.includes(ev.label.slice(0, 10)))
          chipsHtml += `<div class="ch ${ev.chipCls || 'cc'}">${ev.label}</div>`;
      });

      fullHtml += `<div class="${cls}">
        <div class="dn">${d}${todayBadge}</div>
        ${holChip}${chipsHtml}
      </div>`;
    }

    /* Padding final: completa a última linha até múltiplo de 7 */
    const used = startOffset + daysInMonth;
    const pad  = used % 7 === 0 ? 0 : 7 - (used % 7);
    for (let i = 0; i < pad; i++)
      fullHtml += '<div class="dc emp"></div>';

    fullHtml += '</div>'; /* fecha .mgrid */
  });

  /* ── 6. Progress cards (apenas uma vez, no final) ── */
  fullHtml += '<div class="pgrid" style="margin-top:2rem">';
  (PLANNER_DB.progress || []).forEach(p => {
    const ms = (p.milestones || []).map(m =>
      `<div class="ms"><div class="md" style="background:${p.color}"></div>
       <span class="mx">${m.mx}</span>${m.txt}</div>`).join('');
    fullHtml += `<div class="pc">
      <div class="pl">${p.label}</div>
      <div class="pbo"><div class="pbi" style="width:${p.pct}%;background:${p.color}"></div></div>
      <div class="pt">${p.sub}</div>
      <div class="ml">${ms}</div>
    </div>`;
  });
  fullHtml += '</div>';

  view.innerHTML = fullHtml;
}
