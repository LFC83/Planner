/* ── Semanas de Abril/Maio (w5–w9) — geradas dinamicamente por WEEK_MAP ──
   Para cada semana cria um card com os 5 dias úteis calculados via addDays()
   a partir do weekStart da entrada correspondente em WEEK_MAP.
   O weekStart garante transição correcta Mar→Abr (ex: w5 começa 30 Mar).
   Feature Backlog Clean: se o dia activo for Segunda-feira (idx===0)
   os issues com status done são omitidos da lista visual.
── */
(function renderAbrilWeeks() {
  /* Mapa: tabId → chave WEEK_MAP */
  const abrilMap = {
    w5:'w1_abr', w6:'w2_abr', w7:'w3_abr', w8:'w4_abr', w9:'w1_mai'
  };

  /* Labels das semanas */
  const weekLabels = {
    w5:'Semana 30 Mar–5 Abr', w6:'Semana 6–10 Abr',
    w7:'Semana 13–17 Abr',    w8:'Semana 20–24 Abr',
    w9:'Semana 27 Abr–1 Mai'
  };

  /* Alocação textual por semana */
  const weekAllocNotes = {
    w5:'Sprint 100% (até 05 Abr) · PAS inicia 06 Abr',
    w6:'Sprint 60% / PAS 40% · Início PAS',
    w7:'Sprint 60% / PAS 40% · Formação 13–14 Abr',
    w8:'Sprint 60% / PAS 40%',
    w9:'Sprint 60% / PAS 40% · 🏆 Exame UiPath 01 Mai'
  };

  const PT_DOW_FULL = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const UTIL_LABELS = ['Seg','Ter','Qua','Qui','Sex'];

  Object.entries(abrilMap).forEach(([tabId, wdKey]) => {
    const viewEl = document.getElementById('view-' + tabId);
    if (!viewEl) return;

    const range = WEEK_MAP[wdKey];
    if (!range) {
      viewEl.innerHTML = `<div class="week-meta" style="color:var(--a3)">⚠️ Semana não encontrada em WEEK_MAP: ${wdKey}</div>`;
      return;
    }

    const isCurr = (wdKey === currentWeekId);
    const pfx    = isCurr ? `<span style="color:var(--accent)">★ Semana actual</span> · ` : '';

    /* ── Motor de datas: loop de 7 dias (Seg → Dom) via new Date() + addDays ──
       idx 0=Seg … 6=Dom. Soma idx dias ao weekStart da semana.
       O JS resolve automaticamente transições de mês (ex: 30 Mar + 2 = 01 Abr). */
    let daysHtml = '';
    for (let idx = 0; idx < 7; idx++) {
      const dayISO  = addDays(range.start, idx);
      const dayDate = fromISO(dayISO);
      const dow     = dayDate.getDay();          /* 0=Dom, 6=Sáb */
      const isWE    = (dow === 0 || dow === 6);
      const isToday = (dayISO === todayISO);
      const isMon   = (dow === 1);               /* Segunda-feira */

      /* ★ FIX isPast — compara via .getTime() para evitar ambiguidade string */
      const dayObj   = fromISO(dayISO);
      const todayObj = fromISO(todayISO);
      const isPast   = dayObj.getTime() < todayObj.getTime();

      /* Feriado */
      const holiday = (PLANNER_DB.holidays || []).find(h => (h.iso || h.date) === dayISO);

      /* Evento de certificação / calendarEvent — v19: mostra todos os eventos do dia */
      const dayCalEvts = (PLANNER_DB.calendarEvents || []).filter(ev => ev.iso === dayISO);
      const certEvt    = dayCalEvts[0] || null; /* primeiro evento para highlight check */

      /* Alocação do dia */
      const alloc = getAllocation(dayISO);

      /* Dia da semana pt */
      const dowPt   = PT_DOW_FULL[dow];
      const dayNum  = String(dayDate.getDate()).padStart(2,'0');
      const monShort = PT_MONTHS[dayDate.getMonth()].slice(0,3);

      let dayStyle = '';
      if (isPast)   dayStyle = 'opacity:.55;';
      if (isToday)  dayStyle = 'border:1px solid var(--accent);border-radius:8px;padding:.6rem;background:linear-gradient(135deg,#1a1c22,#1e1a0f);';

      let todayMark = isToday
        ? ` <span style="color:var(--accent);font-size:.7em">★ hoje</span>` : '';
      let pastMark  = isPast && !isWE
        ? ` <span style="font-family:JetBrains Mono,monospace;font-size:.55rem;color:var(--muted2)">⏮ concluído</span>` : '';

      /* ── Feature Backlog Clean:
         Se for Segunda-feira (isMon), filtra issues done da lista visual.
         Os issues pendentes são sempre mostrados. ── */
      const issuesForDay = (PLANNER_DB.issues || []).filter(iss => {
        /* Backlog Clean: na segunda, esconde done */
        if (isMon && iss.done) return false;
        return true;
      });

      let issueChips = '';
      if (!isWE && issuesForDay.length > 0 && !isPast && isMon) {
        /* Só mostra chips de issues pendentes na segunda-feira */
        const pending = issuesForDay.filter(i => !i.done);
        if (pending.length > 0) {
          issueChips = `<div style="margin-top:.4rem;display:flex;flex-wrap:wrap;gap:.3rem;">` +
            pending.map(i => `<span style="font-family:'JetBrains Mono',monospace;font-size:.58rem;
              padding:.15rem .4rem;border-radius:3px;background:#e8b84b18;
              color:var(--accent);border:1px solid #e8b84b44">${i.id}</span>`).join('') +
            `</div>`;
        }
        /* Regra de Segunda-Feira: nota de feedback quando done estão ocultos */
        const hiddenDone = (PLANNER_DB.issues || []).filter(i => i.done).length;
        if (hiddenDone > 0) {
          issueChips += `<div style="margin-top:.35rem;font-family:'JetBrains Mono',monospace;font-size:.57rem;color:var(--muted2);">
            <em>(Segunda-feira: itens concluídos ocultos da fila)</em>
          </div>`;
        }
      }

      /* Conteúdo da célula do dia */
      let cellContent = '';

      if (isWE) {
        cellContent = `<div style="font-size:.7rem;color:var(--muted2);font-family:'JetBrains Mono',monospace;">🌿 Descanso</div>`;
      } else if (holiday) {
        cellContent = `<div style="font-size:.72rem;color:#7aef99;">🌴 ${holiday.name}</div>`;
      } else {
        /* Alocação */
        const allocColor = alloc.type === 'mixed' ? '#8baaff' : alloc.type === 'formacao' ? '#f07a7a' : '#8baaff';
        cellContent += `<div style="font-family:'JetBrains Mono',monospace;font-size:.62rem;
          color:${allocColor};margin-bottom:.3rem;">${alloc.label}</div>`;

        /* ★ v19 — Todos os eventos do calendarEvents para este dia */
        if (dayCalEvts.length > 0) {
          dayCalEvts.forEach(ev => {
            const isHL = !!ev.highlight;
            cellContent += `<div style="font-size:.68rem;padding:3px 6px;border-radius:4px;
              background:${isHL ? '#e8b84b18' : ev.chipCls==='cn'?'#5be87a10':ev.chipCls==='cp'?'#e8b84b14':'#5b8dee18'};
              color:${isHL ? 'var(--accent)' : ev.chipCls==='cn'?'#7aef99':ev.chipCls==='cp'?'#f0c96a':ev.chipCls==='cb'?'#f07a7a':ev.chipCls==='cr'?'#c09bf5':'#8baaff'};
              border-left:2px solid ${isHL ? 'var(--accent)' : ev.chipCls==='cn'?'var(--a4)':ev.chipCls==='cp'?'var(--accent)':ev.chipCls==='cb'?'var(--a3)':ev.chipCls==='cr'?'var(--a5)':'var(--a2)'};
              margin-bottom:.25rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${ev.label}</div>`;
          });
        }

        cellContent += issueChips;
      }

      daysHtml += `
        <div style="${dayStyle}${isWE ? 'opacity:.45;' : ''}">
          <div style="font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;
            color:${isToday ? 'var(--accent)' : isPast ? 'var(--muted)' : 'var(--text)'};
            margin-bottom:.3rem;">
            ${dowPt} ${dayNum} ${monShort}${todayMark}${pastMark}
          </div>
          ${cellContent}
        </div>`;
    }

    /* Card de semana */
    const allocNote = weekAllocNotes[tabId] || '';
    const metaStr = `${pfx}${weekLabels[tabId]}${isCurr ? '' : ''} · ${allocNote}`;

    viewEl.innerHTML = `
      <div class="week-meta">${metaStr}</div>
      <div class="card" style="grid-column:1/-1;">
        <h3>Dias da semana · ${weekLabels[tabId]}</h3>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:.6rem;">
          ${daysHtml}
        </div>
        ${isMon_backlogNote(range.start)}
      </div>
      <div class="card" style="margin-top:1rem">
        <h3>Rotina Diária — seleciona um dia no Day Picker</h3>
        <div style="font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);padding:.5rem 0;">
          Clica em <strong style="color:var(--accent)">Rotina Diária</strong> no menu acima
          para ver a timeline detalhada de qualquer dia desta semana.
        </div>
      </div>`;
  });

  /* Helper: nota Backlog Clean visível apenas quando a semana começa numa segunda */
  function isMon_backlogNote(weekStartISO) {
    const d = fromISO(weekStartISO);
    if (d.getDay() !== 1) return ''; /* weekStart deve ser sempre segunda */
    return `<div class="note ng" style="margin-top:.75rem;">
      <div class="nl">🧹 Backlog Clean · Segunda-feira</div>
      Issues com status <em>done</em> estão ocultos nesta vista para manter o foco nos itens pendentes.
    </div>`;
  }
})();

/* ── 15. CERTIFICAÇÃO ──
   Progresso calculado percorrendo cert.phases[*].events[*].
   Conta total de events e quantos têm done:true ou task com ✅.
   ── */
(function renderCert() {
  const view = document.getElementById('view-cert');
  const cert = PLANNER_DB.cert;
  /* ★ Referência de data para comparações dentro deste scope */
  const todayD = fromISO(todayISO);

  /* ══════════════════════════════════════════════════════════
     PONTO 4: Automação de Certificação baseada em data.
     Qualquer evento com date ISO anterior a todayISO é
     considerado concluído AUTOMATICAMENTE — sem editar arrays.
     ══════════════════════════════════════════════════════════ */

  /* Converte "Ter 10 Mar" → "2026-03-10" para comparar com todayISO */
  function eventDateToISO(dateStr) {
    const PT_M = {jan:'01',fev:'02',mar:'03',abr:'04',mai:'05',jun:'06',
                  jul:'07',ago:'08',set:'09',out:'10',nov:'11',dez:'12'};
    const m = dateStr.match(/(\d{1,2})\s+([A-Za-z\u00C0-\u00FF]{3})/);
    if (!m) return null;
    const key = m[2].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').slice(0,3);
    const mon = PT_M[key]; if (!mon) return null;
    return `2026-${mon}-${m[1].padStart(2,'0')}`;
  }

  /* Evento concluído se: done===true OU data anterior a hoje */
  function isEventDone(ev) {
    if (ev.done) return true;
    const iso = eventDateToISO(ev.date || '');
    return iso && iso < todayISO;
  }

  /* Progresso global: percorre todas as phases.events */
  let totalEv = 0, doneEv = 0;
  (cert.phases || []).forEach(ph => {
    (ph.events || []).forEach(ev => {
      totalEv++;
      if (isEventDone(ev)) doneEv++;
    });
  });
  if (totalEv === 0 && cert.topics) {
    totalEv = cert.topics.length;
    doneEv  = cert.topics.filter(t => t.done || (eventDateToISO(t.d||'') < todayISO)).length;
  }
  const phasePct      = totalEv > 0 ? Math.round(doneEv / totalEv * 100) : 0;
  const phaseBarColor = phasePct === 100 ? 'var(--a4)' : 'var(--accent)';

  /* D1–D14 topics grid (done auto-detected by calendarEvents date) */
  const topicsDone = (cert.topics||[]).filter(t => {
    if (t.done) return true;
    const ev = (PLANNER_DB.calendarEvents||[]).find(e => e.label && e.label.includes(t.title));
    return ev && ev.iso < todayISO;
  }).length;
  const topicsLen  = (cert.topics||[]).length;
  const topicsPct  = topicsLen > 0 ? Math.round(topicsDone / topicsLen * 100) : 0;
  const topicsHtml = (cert.topics||[]).map(t => {
    const ev = (PLANNER_DB.calendarEvents||[]).find(e => e.label && e.label.includes(t.title));
    const autoDone = t.done || (ev && ev.iso < todayISO);
    return `
    <div class="dtopic${autoDone?' dtopic-done':''}">
      <div class="dtag">${t.d}</div>
      <div class="dtitle">${t.title}</div>
      <div class="ddesc">${t.desc}</div>
    </div>`;
  }).join('');

  /* Phases HTML — ✅ automático por data */
  let phasesHtml = '';
  if (cert.phases && cert.phases.length) {
    cert.phases.forEach(ph => {
      const phDone  = (ph.events||[]).filter(ev => isEventDone(ev)).length;
      const phTotal = (ph.events||[]).length;
      const phComplete = phDone === phTotal && phTotal > 0;

      const evHtml = (ph.events||[]).map(ev => {
        const done = isEventDone(ev);
        const hl   = ev.highlight;
        const evISO = eventDateToISO(ev.date||'');
        /* ★ FIX — comparação via Date objects, evita ambiguidade entre meses */
        const isPastEv = evISO && fromISO(evISO).getTime() < todayD.getTime();
        return `
          <div class="tb" style="${hl?'border-left:2px solid var(--accent);padding-left:.4rem;margin-left:-.4rem;':''}${isPastEv&&!done?'opacity:.6;':''}">
            <div class="tt" style="color:${hl?'var(--accent)':ph.color||'var(--accent)'}">
              ${ev.date}
            </div>
            <div class="tc ${done?'tcc':'tw'}"
                 style="${done?'opacity:.7;text-decoration:line-through;':''}">
              ${ev.task}${done&&!hl?' ✅':''}${hl&&done?' 🏆':''}
            </div>
          </div>`;
      }).join('');

      phasesHtml += `
        <div class="cert-phase">
          <div class="cert-phase-header">
            <span class="cert-phase-tag"
                  style="background:${ph.color||'var(--accent)'}22;
                         color:${ph.color||'var(--accent)'};
                         border:1px solid ${ph.color||'var(--accent)'}44">
              ${ph.tag}
            </span>
            <span class="cert-phase-title">${ph.title}</span>
            <span class="cert-phase-dates">${ph.dates}</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:.6rem;
                         color:${phComplete?'var(--a4)':'var(--muted)'};margin-left:auto;">
              ${phComplete ? '✅' : `${phDone}/${phTotal}`}
            </span>
          </div>
          ${evHtml}
        </div>`;
    });
  }

  const hoursHtml = (cert.hoursBreakdown||[]).map(h =>
    `<div class="cert-row">
       <span>${h.label}</span>
       <span style="color:${h.color};font-family:'JetBrains Mono',monospace">${h.hrs}</span>
     </div>`).join('') +
    `<div class="cert-total"><span>Total</span><span>${cert.totalHours}</span></div>`;

  const footerNotes = (cert.notes||[]).map(n =>
    `<div class="note ${n.cls}"><div class="nl">${n.label}</div>${n.txt}</div>`
  ).join('');

  view.innerHTML = `
    <div style="font-family:'JetBrains Mono',monospace;font-size:.65rem;
         color:var(--muted);margin-bottom:1.2rem;">
      🎯 ${cert.title} · Target: <span style="color:var(--accent)">${cert.target}</span>
    </div>

    <div style="margin-bottom:1.5rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:.6rem;
             text-transform:uppercase;letter-spacing:.1em;color:var(--muted);">
          Progresso Global · ${doneEv}/${totalEv} eventos
          <span style="color:var(--muted2);margin-left:.4rem">(auto-calculado por data)</span>
        </div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:.72rem;
             color:${phaseBarColor};font-weight:600;">${phasePct}%</div>
      </div>
      <div class="pbo" style="margin-bottom:1.2rem;">
        <div class="pbi" style="width:${phasePct}%;background:${phaseBarColor}"></div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:.58rem;
             text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);">
          Tópicos D1–D14 · ${topicsDone}/${topicsLen}
        </div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--a4);">
          ${topicsPct}%
        </div>
      </div>
      <div class="pbo" style="margin-bottom:.8rem;">
        <div class="pbi" style="width:${topicsPct}%;background:var(--a4)"></div>
      </div>
      <div class="dtopics-grid">${topicsHtml}</div>
    </div>

    <div class="grid2">
      <div class="card">
        <h3>Plano · Fases de Estudo</h3>
        ${phasesHtml}
      </div>
      <div class="card">
        <h3>Horas Totais &amp; Estratégia</h3>
        <div class="cert-hours">${hoursHtml}</div>
        ${footerNotes}
      </div>
    </div>`;
})();

/* ── 16. ACTIVAÇÃO AUTOMÁTICA ──
   autoActivate: usa currentWeekId (derivado de weekStarts via WEEK_MAP)
   para selecionar o tab correto + vista ao abrir o ficheiro.
   TAREFA 2: chama renderCalendarsGrid() — nome real da função nomeada.
   ── */
(function autoActivate() {
  /* ── 1. Descobrir tab da semana actual ──
     Percorre PLANNER_DB.weeks e encontra o primeiro cujo TAB_TO_WD_KEY[id]
     corresponde a currentWeekId. Inclui os novos IDs w5–w9. */
  let targetTabId = 'month';
  PLANNER_DB.weeks.forEach(w => {
    const wdKey = TAB_TO_WD_KEY[w.id] || w.id;
    if (wdKey === currentWeekId) targetTabId = w.id;
  });

  /* ── 2. Activar tab e view correctos ──
     Percorre todos os botões .tab: adiciona .on ao que corresponde a
     targetTabId; garante que o ★ já injetado pelo build de tabs
     está presente no botão activo. */
  document.querySelectorAll('.tab').forEach(btn => {
    const isTarget = (btn.dataset.weekId === targetTabId);
    btn.classList.toggle('on', isTarget);
  });

  /* Sincroniza o select mobile com o tab activo */
  if (tabsMobileSelect) tabsMobileSelect.value = targetTabId;

  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  const targetView = document.getElementById('view-' + targetTabId);
  if (targetView) targetView.classList.add('on');

  /* ── 3. Day Picker visível apenas na Rotina Diária ── */
  document.getElementById('day-picker').style.display =
    targetTabId === 'daily' ? 'flex' : 'none';

  /* ── 4. Calendário renderizado apenas se tab activa for 'month' ──
     NÃO chama renderCalendarsGrid() para outros tabs — a função já
     foi invocada na linha de inicialização (renderCalendarsGrid() após
     o fecho da IIFE renderAbrilWeeks). Ao chamar aqui evita-se duplicação.
     Excepção: se targetTabId === 'month' força re-render para garantir
     que o calendário está presente (caso autoActivate corra antes de
     qualquer outro render). */
  if (targetTabId === 'month') {
    renderCalendarsGrid();
  }

  /* ── 5. Stampar data-iso nos botões do Day Picker (semana actual) ──
     ★ FIX 2 — usa weekStart da semana activa via WEEK_MAP, não todayISO.
     Garante que a semana 30 Mar–5 Abr stampa os ISOs correctos mesmo
     quando hoje cai noutra semana.
     ★ Motor de datas robusto: usa new Date() + addDays(weekStart, idx)
     para calcular cada dia — transição Mar→Abr automática. */
  const activeRange  = WEEK_MAP[currentWeekId];
  const activeMonday = activeRange ? activeRange.start : getWeekdayISO(todayISO, 0);

  /* ★ Loop robusto: soma idx dias ao weekStart via new Date()
     Garante que "Seg 30 Mar" + 2 = "Qua 01 Abr" correctamente */
  document.querySelectorAll('.dpbtn').forEach((btn, idx) => {
    const dayISO  = addDays(activeMonday, idx);   /* new Date() + setDate — transição automática */
    const dDate   = fromISO(dayISO);
    const dayNum  = String(dDate.getDate()).padStart(2,'0');
    const monSh   = PT_MONTHS[dDate.getMonth()].slice(0,3);

    btn.dataset.iso = dayISO;

    const certEvt = (PLANNER_DB.calendarEvents || []).find(ev => ev.iso === dayISO && ev.chipCls === 'cc');
    const anyEvt  = (PLANNER_DB.calendarEvents || []).find(ev => ev.iso === dayISO);
    const holiday = (PLANNER_DB.holidays       || []).find(h  => (h.iso||h.date) === dayISO);
    let suffix = '';
    if      (certEvt && certEvt.highlight) suffix = ' 🏆';
    else if (certEvt)                      suffix = ' 📚';
    else if (anyEvt  && anyEvt.chipCls !== 'cc') suffix = ' 📅';
    else if (holiday)                      suffix = ' 🏖️';

    btn.textContent = `${WEEKDAY_LABELS[idx]} ${dayNum} ${monSh}${suffix}`;
    btn.title = certEvt ? certEvt.label : (holiday ? holiday.name : dayISO);

    /* ★ Sync dp-active com activeDayIdx — garante que Qua (idx=2) fica
       activo quando hoje é Quarta-feira (e para qualquer outro dia útil). */
    btn.classList.toggle('dp-active', idx === activeDayIdx);
    /* ★ dp-today: destaca sempre o botão cujo ISO corresponde a hoje */
    btn.classList.toggle('dp-today',  dayISO === todayISO);
  });

  /* ── 6. Renderizar timeline para o dia inicial ── */
  const initISO = addDays(activeMonday, activeDayIdx);
  renderDashboardDay(activeDayIdx, initISO);
})();

</script>
</body>
</html>
